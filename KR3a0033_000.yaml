body:
  text: 程敬叔讀書分年日程序九經者羣聖人之遺書也書徒聖人之言也然聖人之心必因言而後形善學者必得聖人之言而後得聖人之心豈有他道哉故學焉而不得其言言焉而不得其心皆非善學者也惟夫得其言而熟諸口則言吾言也而後可以精思得其心而反諸身則心吾心也而後可以力踐古之人學以玉于聖人之道者如是而巳耳始豫少時從臨海方先生學先生授之子朱子讀書之法以謂必熟讀精思而後有以為力行之地是時志氣精眀又善強記積日夜思竊窺見其端乃自以為甚足而不知熟之之妙及年益玉聰眀益不逮強記益落始悔不用先生之言今年來金陵聞敬叔氏賢日往造之玉則見其教弟子一用朱子法善之候其少休則坐其弟子而與之言辨析擊難皆成誦經傳而能通其指意于是益大善之求其所為立教之法讀之蓋盡裒朱子真氏教人讀書之遺言而別為莭度使粗若可用課核者區別精詳具見條理為法蕳易補益宏多于是益恨吾前日之不知讀書也因念朱子之學所以獨能上探堯舜禹湯攴王孔孟氏之心而接程子之緒者其始也皆由熟讀精思而得之故其告君也以是其誨人也以是為説具在苟學焉者既熟諸口矣而又精思之既眀諸心矣而又力踐之然後知朱子之所以為學者不外乎此而敬叔氏之書為有㓛于我其與少有得而自以為足者㓛相万也至順三年冬十月初吉永嘉李孝光序讀書分年日程序今父兄之愛其子弟非不知教要其有成十不能二三此豈特子弟與其師之過為父兄者自無一㝎可久之見曾未讀書明理遽使之學文為師者雖眀知其未可亦欲以文墨自見不免于阿意曲徇失序無本欲速不逹不特文不足以言文而書無一種精熟坐失嵗月悔則已老且始學既差先入為主終身陷于務外為人而不自知弊冝然也孔子之教序志道據德依仁居遊藝之先周禮大司徒列六藝居六德六行之後本末之序有不可紊者今制取士以德行為首經術為先詞章次之蓋因之也況今明經一主朱子説使理學與舉業畢貫于一以便志道之士漢唐宋科目所未有也誠千載學者之大幸尚不自知而忍紊之邪嗟夫今士之讀經雖知主朱子説不知讀之固自有法也讀之無法故猶不免以語言文字求之而為程試資也昔胡文㝎公于程學盛行之時有不絶如線之嘆竊恐此嘆將復見今日也余不自揆用敢輯為讀書分年日程與朋友共讀以救斯弊蓋一本輔漢卿所稡朱子讀書法修之而先儒之論有禆于此者亦間取一二焉嗟夫欲經之無不治理之無不明治道之無不通制度之無不考古今之無不知文詞之無不逹淂諸身心者無不可推而為天下國家用竊意守是庶乎本末不遺而工夫有序已淂不忘而未能日增玩索精熟而心與理相浹靜存動察而身與道為一德形于言辭而可法可傳于後較其所就豈丗俗偏長一曲之學所可同日語哉延祐二年八月鄞程端禮書于池之建德學
