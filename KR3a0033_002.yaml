body:
  text: 原注缺三十二字彼此異音辨節去字注羌舉切與唐韻合陸本舉誤與恊音借義節噍字注微噍之音與禮記樂記合陸本噍誤啾此外訛誤亦尙不尠舊有序跋均無存焉按畏齋自跋歷舉江浙等處鈔刊諸本今均不可復見陸氏所据殆非程氏勘定之本故不免有所疏漏然則程氏此書要以是本爲至善矣甲戌初冬崑山胡文楷程氏家塾讀書分年日程卷二四書本經旣明之後自此日看史仍五日內專先師果齋史先生云書自有當熟讀者自分二日倍溫玩索四書經注或有當玩讀者自有當看者自有當編鈔者問本經傳注倍溫諸經正文夜惟經要熟讀非曰他書皆讀二百遍也自閒讀看玩索溫看性理書並如看通鑑則朱子已令只一遍便要作濟河前法爲學之法自合接續明經今以其學文不可過遲遂焚舟計蓋可知也次讀史次讀韓文次讀離騷次學作文然後以序明諸經覽者詳焉看通鑑朱子曰看史先看史記及左氏却看看通鑑及參綱目兩漢以上參看史西漢東漢及三國志次看通鑑又曰通記漢書唐參唐書范氏唐鑑看鑑却是連記去一事只一處說别無互見取一卷或半卷隨宜增減四書旣明散在編年雖是大事其初却小後來却漸胷中巳有權度自此何書不可看雖不必如讀漸做得大故人初看時不曾看得精神只經之遍數亦須虛心反覆熟看管看後來却記不得不若先草草看正史至於一事之始末一人之姓名一過正史各有傳可見始末又有他傳可爵里諡號世系皆當子細攷求互考所以昜記毎看一代正史記却去看彊記又須分項詳看如當時君通鑑又曰通鑑且將全本熟看却去看綱臣心德之明暗治道之得失紀目以發明之儘好議論也眞西山任湖綱之脩廢制度之因革國本之南安撫榜亦令學者通鑑與綱目並看虚實天命人心之離合君子小程子毎讀史到一半便掩卷思量料其成人之進退刑賞之當濫國用之敗然後却看有不合處又更精思其閒多奢儉稅歛之輕重兵力之彊弱有幸而成不幸而敗今人只見成者便以外戚宦官之崇抑民生之休戚爲是敗者便以爲非不知成者煞有不是風俗之厚薄外夷之叛服如此敗者煞有是底朱子曰看史但欲通知等類以項目寫貼眼前以備逐古今之變又以觀其所處理義之得失耳項思玩當時之得失如當日所揚志之患讀史無記性須三四遍方記讀項目無者亦須通照前後思得而乆後又忘了朱子曰只第一遍讀時之如我親立其朝身任其事每須用功作相別計止此更不再讀便記得事以我得於四書者照之思其有一士人讀周禮疏讀第一板訖卽焚了得失合如何論斷合如何區處讀第二板卽焚了是亦作焚舟計若初有所得與合記者用冊隨鈔然且草草讀一遍凖擬三四遍便記不牢後參諸儒論斷管見綱目凡例果齋史先生云胡致堂於貶所無書作讀尹氏發明金仁山通鑑前編胡史管見蓋胷中黙記全史而作也其記史庭芳古今通要之類以驗學識之法蓋用史貼壁虚心覽記畢方換一冊之淺深不可先看他人議論如再貼如前其法妙絶朱子亦取之後有用矮人看場無益然亦不可先立非餘人以次說證如前畢却倚杖於壁上讀西山文章正宗內韓文議論虛心溫看令熟幷分項思玩其得失或三叙事兩體華實兼者七十餘篇五日或旬日又換一冊大勝案上看也要認此兩體分明後最得力正以朱子考異表以所廣謝疊山批點篇法章法句法字法備見日熟讀一篇或兩篇亦須百遍成誦緣一生靠此爲作文骨子故也旣讀之端禮有廣疊山批點法及韓文叙事議論後須反覆詳看每篇先看主意批點成書二冊以識一篇之綱領次看其叙述果齋先生云讀書如銷銅聚銅入爐大韛抑揚輕重運意轉換演證開闔扇之不銷不止極用費力作文如鑄器銅關鍵首腹結末詳略淺深次序旣銷矣隨模鑄器一冶卽成只要識模全旣於大段中看篇法又於大段不費力所謂勞於讀書逸於作文者此也中分小段看章法文於章法中看句法句法中看字法則作者李漢韓文序記公爲斈敎人經書必通念之心不能逃矣譬之於樹通看曉析諸史百子止搜抉無隱文則敎人自則由根至表榦生枝枝生華葉爲果齊先生確守是以訓學者大小次第相生而爲樹又折一先生又云叙事體當自韓學上儘簡古不榦一枝看則又皆各自有枝榦妨至史漢而止議論體當自韓學下要展華葉猶一樹然未嘗毫髪雜亂開格則兼歐曾王料則兼朱吕張眞魏方此可以識文法矣看他文皆當爲盡善所以欲先讀韓文叙事議論兩體如此看乆之自會得法今日學者蓋以韓能復古文正体酌之古今爲得文能如此看則他日作文能如中故也又云凡斈文當以眞西山文章此作亦自能如此改矣然又當正宗爲準則蓋其編選一本朱子之意知有法而無法無法而有法有法者篇篇皆有法也無法者篇篇法各不同也所以然者如化工賦物皆自然而然非區區模擬所致有意於爲文巳落第二義在我經史熟析埋精有學有朱子曰貫穿百氏及經史乃所以辨驗是識有才又能集義以養氣是皆非明此義理豈特欲使文詞不陋而已義有以爲文章之根本矣不作則理旣明又能力行不倦則其存諸中必也巳作則沛然矣第以欲求其言光明四達何施不可發而爲言以宣其心語之工不得不如此讀看耳非當自發越不凡可愛可傳矣今執筆以習曰止歩驟此而能作文也果能研鑽華采之務悅人者外而巳可耻也如此工程讀書將見突過退之矣又曰文字無大綱領拈掇不起某平生何止肩之而巳且如朱子或問不㑹做補接底文字補湊得不濟事及集中文字皆是用歐曾法試看歐曾曾有朱子議論否此非西山眞先生曰朱子之文有東坡之氣燄妄言若能如此讀書則是學天東坡無朱子之理致讀朱子之文古人之下第一等學作天下第一等文文幾爲之盡廢又曰朱子之文如揚鸞振爲天下第一等人在我而巳未策於九軌之衢有蕩蕩平平氣象果齋易與俗子言也自此看他文欲先生曰能次朱子之文有華有實者惟眞識文體有許多様耳此至末事魏二先生而巳一看足矣不必讀也其學作文次第詳見于后一六日內分三日倍溫玩索四書經注或問本經傳注諸經正文及溫看史夜閒讀看玩索溫看性理書如前法韓文畢次讀楚辭讀楚辭正以朱子集注詳其音讀訓朱子曰離騷辭賦之祖義須令成誦縁靠此作古賦骨子故也自此他賦止看不必讀也其學賦次第詳見于后一分日倍溫玩索四書經注或問本經傳注諸經正文溫看史夜閒讀看玩溫性理書如前法性理畢次攷制度制度書多兼治道有不可分者詳見諸經注䟽諸史志書通典續通典文獻通攷鄭夾漈通志略甄氏五經筭術玉海山堂攷索尚書中星閏法詳林勲本政書刋賀州婺州說林勲本政書朱子井田譜夏氏井田譜蘇氏地理指掌圖程氏禹貢圖酈道元水經張主一地理淪革漢官攷職源陸農師禮書禮圖陳祥道禮書陳暘樂書蔡氏律吕新書及辯證律準禋典郊廟奉祀禮文吕氏兩漢菁華唐氏漢精義唐精義陳氏漢博議唐律注䟽宋刑統大元通制成憲綱要說文五音韻譜字林五經文字九經字様戴氏六書故王氏正始音陸氏音義牟氏音攷賈氏羣經音辨丁度集韻司馬公類篇切韻指掌圖呉氏詩補音及韻補四聲等子楊氏韻譜先擇制度之大者如律曆禮樂兵刑天文地理官職賦役郊祀井田學校貢舉等分類如山堂攷索所載歷代沿革考覈本末得失之後斷以朱子之意及後世大儒論議如朱子經濟文衡吕成公制度詳說每事類鈔仍畱餘紙使可續添又自爲之箸論此皆學者所當窮格之事以夫子之聖猶必問禮問樂而後能知豈可委之以爲名物度數之細而略之平日誠能沉濳參伍以求其故一旦在朝庶免禮官不識禮樂官不識樂之誚而和胡阮李范馬劉楊不能相一之論可决禘祫廟制可自我而定如韓子朱子矣豈特可倣源流至論及吕成公錢學士百段錦作成策段爲舉業資而巳通鑑韓文楚辭旣看旣讀之後約纔二十歲或二十一二歳仍以每日早飯前循環倍溫玩索四書經注或問本經傳注諸經正文溫看史溫讀韓文楚辭之外以二三年之工專力學文旣有學識又知文體何文不可作學作文學文之法讀韓文法巳見前旣知篇朱子曰歐公文字敷腴溫潤曾南豐文字法章法句法字法之正體矣然又更峻潔後更看全集有謝疊山批點及選看歐又曰人要會作文讀取一部西漢文歐陽陽公有陳同父選者佳曾南豐類藁王文南豐文韓文臨川三家文體然後知展開閒曾子固與王介甫書云歐公悉見足下之架之法緣此三家俱是步驟韓文愛嘆誦寫不勝其勤歐公更欲足下少文明暢平實學之則文體純一開廓其文勿用造語及摸擬前人歐云孟庶可朢其成一大家數文字歐曾韓文雖高不必似之也取其自然耳比韓更開闔分明運意縝密易學而耐點檢然其句法則漸不果齋先生曰名家之文曰韓柳歐蘇曾王若韓之古朱子學之句又長矣眞西山雖亦主於明理句法還陳短不可不知他如柳子厚文先看西山所選朱子曰東坡文字明快老蘇文雄渾儘有叙事議論次看全集蘇明允文皆不可不好處如歐公曾南豐韓昌黎之文豈可不看其餘諸家之文不須雜看此看柳文雖不全好亦當擇合數家之文擇是自韓學下來漸要展開之法之無二百篇下此則不須看恐低了人手看此要識文體之佳耳其短於叚但採他好處以爲議論足矣若班馬孟理處極多亦可以爲理不明而子則是大底文字又曰前輩文字有氣不幸能文之戒如欲叙事雄深骨故其文壯浪如歐公東坡亦皆於經術雅健可以當史筆之任當直學本領上用功今人只是於枝葉上粉澤爾史記西漢書先讀眞西山文章如舞迓鼓然其閒男子婦人僧道雜色無正宗及湯東㵎所選者然後熟所不有但都是假底看班馬全史此乃作紀載垂世朱子一日說作文曰不必箸意學如此文之文不可不學後生學文先能章但須明理理道精後文字自典實展開滂沛後欲收歛簡古甚易又曰某嘗最愛看陳無巳文他文字也多若一下便學簡古後欲展開作曲折大篇難矣若未忘場屋欲學策程子曰人多說某不敎人習舉業某何嘗以我平日得於四書者爲本更不敎人習舉業人若不習舉業而朢及第守平日所學文法更略看漢唐却是責天理而不修人事但舉業旣可以策陸宣公奏議朱子封事書䟽及第卽巳若去上面力求必得之道是惑宋名臣奏議范文正公王臨川也朱子嘗論科舉云非蘇東坡萬言書策略策别等學是科舉累人自是人累科舉若高見遠識陳利害則得矣況性理治道制之士讀聖賢之書㩀吾所見而爲文以應度三者巳下工夫亦不患於無之得失利害置之度外雖日應舉亦不累以答所問矣雖今日時務得失也居今之世使孔子復生也不免應舉豈亦須詳究欲學經問直以大學能累孔子耶中庸或問爲法平日旣讀四書注及讀看性理文字又不患於無本矣欲學經義亦倣或問文體用朱子貢舉私議中作義法爲骨子方今科制明經以一家之說爲主兼用古注疏乃是用朱子貢舉私議之說按貢舉私議云令應舉人各占兩家以上將來答義則以本說爲主而旁通他說以辨其是非則治經者不敢妄牽巳意而必有据依矣又云使治經者必守家法命題皇祐初司馬溫公爲貢院屬官時有詔士者必依章句答義者必通貫經能講解經義者聽别奏名應詔者數十人文條舉衆說而斷以已意當更趙周翰爲侍講知貢舉問以春秋禮記大寫卷之式明著問目之文而疏義其中一人所對甚精詳先具注疏次引其上下文通約三十字以上次先儒異說末以已意論而斷之凡二十問列所治之説而論其意次又旁所對皆然主司驚異擢爲等一及進糊名引他說而以已意反覆辨析以乃進士劉恕方年十八溫公以是慕重之求至當之歸但令直論聖賢本意與其施用之實不必如今日端禮嘗疑方今取中經義格用冒原講證分段破題對偶敷衍之體毎道結似宋末第二篇義様書坊又刋以爲定只限五六百字以上至於舊例式恐非設科初意延祐七年正月廿七日經義禁引史傳乃王氏末流之親以質之鄧善之善之曰前年㑹試所落弊皆當有以正之此私議之說者皆冒原講證結者今後只冝子細看朱也竊謂今之試中經義旣用張子貢舉私議守之爲法某巳於試院碑上庭堅體亦不得不略倣之也攷明言之以戒舉子矣設科時某在試者是亦不思之甚也張庭堅朝與聞貢舉之議正欲革宋經義敷衍虛體巳具冒原講證結特未如宋浮之弊所以用貢舉私議明經主某說兼末所謂文妖經賊之弊耳致使累用某說要人實下工夫讀傳注豈宜自誤舉所取程文未嘗有一篇能盡依聖朝科制一科埸毎三歳一今制明舉所主所用所兼用之次開試㪯人從本貫官司於路說者此皆考官不能推明設科府州縣斈及諸色戸內推選年𥘉意預防末流輕淺虚衍之弊二十五以上郷黨称其孝悌朋致使舉舉相承以中爲式今日友服其信義經明行脩之士結郷試經義欲如𥘉舉方希愿禮罪保㪯以礼敦遣貢諸路府其記義者不可得矣科或徇私濫㪯并應㪯而不㪯者制明曰不拘格律蓋欲學者直監察御史粛政廉訪司体察究寫胷中所學耳奈何隂用冒原治講證結格律死守而不變安得一考試程式蒙古色目人士務實學得實材爲第一埸經問五條大學國家用而爲科目増重哉因著論語孟子中庸內設私論于此以待能陳於問義理精明文辝典上者取焉如自雅爲中選用朱氏章朝廷議脩學校敎法以輔賔興句集注第二埸策之制則此弊息矣假如書義倣以時務出題限五百張體以蔡傳之說爲終篇主意字以上漢人南人如論破然如傳辭巳精緊而括盡題第一場明經經疑二問意則就用之爲起或略而泛則大學論語孟子中庸以其意自做次略衍開次入題內出題並用朱氏章發明以結之次官題題下再提句集注復以已意結起前綱主意歴提上下經文而之限三百字以上歸重此題次反覆敷演或正演經義各治一經或反演或正引事證或反引事詩以朱氏爲主尚書證繳歸主意次結或入講腹提以蔡氏爲主周易以問逐節所主之說所以釋此章程氏朱氏爲主以上之意如孔頴逹䟽文釋注之体逐節發明其三經兼用古注䟽春說援引以證之繳歸主意後節秋許用三傳及胡氏如前又緫論以結之如易又旁傳礼記用古注䟽限通所主次一家說又發明其異五百字以上不拘格者而論断之又援引以證之結律第二埸古賦之次兼用注疏論其得失而断詔誥章表內科一道之證之結之平日既熟讀經傳古賦詔誥用古本章又不患於無本矣此亦姑言其表参用古体四六大略耳在作者自有活法直冩第三場策一道平日所得經旨無不可者元設經史時務出題科條制旣云作義不拘格律不矜浮藻惟務直述則自可依貢舉私議法此則最限一千字以上妙如不得巳用張庭堅體亦須朱子曰古賦須熟看屈宋韓柳所作乃有守傳注議論確實不鑿不浮可進歩處又曰林艾軒云司馬也欲學古賦讀離騷巳見前更相如賦之聖者揚子雲班孟堅只塡得他看讀楚辭後語幷韓柳所作句腔子如何得似他自在流出左太冲張平法韻度則巳得之欲得著題命子竭盡氣力又更不及意閒架辭語縝密而有議論爲編賦題賦料參王厚齋詞學指南法及玉科舉用則當擇文選中漢魏諸海制詔章表參詞學指賦七發及晉問熟看大率近世南法四六章表參四六寶苑及名公四六文章視古漸弱其運意則縝密於前但於文選文粹文鑑觀之韓禮部名居仁字君美號艾溪汴人早與便見欲學古體制誥章表讀文果齋史先生同師常德陽先生至元閒來章正宗辭命類及選看王臨川爲慶元路經歷極力興學校敦請果齋爲曾南豐蘇東坡汪龍溪周平園大學師相與定議諸生明經必主某說兼宏辭總類等體四六章表以王用某說蓋用朱子貢舉私議法也其後入臨川鄧潤父曾南豐蘇東坡汪爲禮部掌行科舉鄧善之云科舉之行集龍溪周平園陸放翁劉後村及宏議折衷奏裁韓君美備殫心力事成而公辭總類爲式其四六表體今縱未卒殆非偶然能盡見諸家全集選鈔亦須得舊本翰苑新書觀之則見諸家之體且幷得其編定事料爲用作科舉文字之法用西山法按西山應舉工程云時文有四類一讀看近經問文字九日作一日性理二治道三故事四制度自初一讀看近經義文字九日作一日日至初九日編性理賦日一道或半讀看古賦九日作一日道如無箋本卽檢經史對過然後自讀看制誥章表九日作一日寫初十日作性理賦或一二課亦從讀看策九日作一日其便十一日至十九日編性理論二十日作他文皆然文體旣熟旋增作作性理論二十一日至二十八日或二十文日數大抵作文辦料識格在九日編性理策論策亦皆檢用事處箋寫於平日此用剡源戴氏法及作文之日月終則作性理策次月再輪如初賦論策得題卽放膽此用疊山謝氏法立定主毎類只須二三十篇惟擇其最佳者性理意便布置閒架以平日所見一賦畢編治道賦治道賦畢編制度及故事筆掃就却旋改可也如此則筆賦論策亦然旣知格式又能遣辭卽參以力不餒作文以主意爲將軍轉古文如韓歐曾蘇等集各取明白純粹及換開闔如行軍之必由將軍號近於時文者與時文閒讀則散文不患不令句則其裨將字則其兵卒事工此西山之訓愚今倣其法亦以今料則其器械當使兵隨將轉所制三場分四類輪流編鈔讀作以東坡答江隂葛延之萬里徒按歐陽永叔每以所作貼壁待心事虚閒步至儋耳求作文祕訣曰意而時如瞥見他人文字相似則得失瞭然篇巳作文事料散在經史子集惟篇如此改過所以居士集最佳意足以攝之正此之謂如通篇愚謂舉業必求其義理精深攷證的確措主意閒架未定臨期逐旋摹擬詞雅當敷述明暢又詳略開合繳結首尾用盡心力不成文矣切戒法度整嚴又平實自然則正大一仍以每日早飯前倍溫四書經注或問光明程文卽古文矣今場中所取文字一本經傳注諸經正文溫史夜閒考舉不如一舉未足爲法頭場尤甚所以日索制度書溫看性理書如前法程欲其讀看先需佳作之專以二三年工學文之後纔二十二三歲近頭場者此也學者宜深思之或二十四五歲自此可以應舉凡有所作卽以貼壁改而又改自畫截圈矣三埸旣成却旋明餘經及作抺用平日看文例以求篇章句字一一中古文餘經合讀合看諸書也見的方止毎種作得一二十篇則能事畢矣于前竊謂明四書本經必用朱子讀法必專用三年之功夜止劉損齋敎平日作舉業者止攜監韻入室兼看性理書並不得雜以他書鎖門如場中則習貫整暇也必以讀經空眼簿日塡以自程看史及學文必在三年之外所作經義必盡依科制條舉所主所用所兼用之說而推明之又必擇友舉行藍田朱子文集有增損吕氏鄕約吕氏鄕約之目使德業相勸過失相規則學者平日皆知敦尚行實惟恐得罪於鄉評則讀書端禮始者亦嘗用西山應舉工程法敎友不爲空言而士習厚矣必若此朋矣蓋其一日之內讀四書本經看文作然後可以仰稱科文看史兼此五項工夫而其用工迫促所制經明行脩鄉黨稱其孝悌朋讀之書不精不熟無一種可了而所作之友服其信義之實庶乎其賢林文亦不能工與今俗學無異且使學者終盛而治敎興也豈曰小補古者大身無爲已自得之實所謂本末俱失者也司徒以鄕三物敎萬民而賔興其後直用朱子法爲此分年日程確守以之未有不敎而可以賔興者方今與友朋共學極有實效然亦約自十五志聖朝科制明經一主程朱之說學起不過三年讀四書本經傳注并考索使經術埋學舉業三者合一以三年之外看史學文編鈔共六年耳所謂開志道之士此誠今日學者之本末俱得者也端禮不才職敎事者四十大幸豈漢唐宋科目所能企其年日夕従事俻究得失深知朱子所謂横萬一第因方今學校敎法未立渠成誦爲學者捷徑之說誠確論也敢述不過隨其師之所知所能以之于此与四方有志之士共守之爲敎爲學凡讀書纔挾冊開卷巳凖擬作程文用則是未明道巳計功未正誼巳謀利其始不過因循苟且失先後本末之宜而巳豈知此實儒之君子小人所由以分其有害士習乃如此之大嗚呼先賢敎人格言大訓何乃置之無用之地哉敢私箸于此以待職敎養者取焉右分年日程一用朱子之意修之如此讀書學文皆朱子曰古人於小學自能言便有敎一歳辦纔二十二三歳或二十四五有一歳工夫而今都蹉過了更不能轉去歳若緊著課程又未必至此時作得只據而今地頭便剳住立定脚跟作也雖前所云失時失序者不過去㘽種後來根株𥙷塡前日欠缺如二十更增二三年耳大抵亦在三十歳覺悟便從二十歳立定脚跟作去如三歳前皆辦也世之欲速好徑失十歳覺悟便從三十歳立定脚跟作去便先後本末之序雖曰讀書作文年八九十歳覺悟亦當據見前剳住硬寨而白首無成者可以觀矣此法作出似乎迂闊而收可必之功如種之穫云前所云學文之後方再明一經出於不得巳纔能作文之後便𥙷一經不可遲須是手自鈔讀其諸經鈔法讀法並巳見前其餘經史子集音義旁證等書别見書目凡前引用書名其稱姓氏名字謚號從丗今不備載惟取旁證一二日當觀省者于末卷所易知故不歸一讀經之後當看全史一過看張子邵子三胡張南軒吕東萊眞西山魏鶴山程朱門人之書一過批點經書凡例館閣校勘法句讀二字側點爲句中點爲讀凡人名地物名并長句內小句並從中點勉齋批點四書例句讀例句舉其綱文意斷讀者也相應文意未斷覆舉上文上反言而下正上有呼下字下有承上字點抹例紅中抹一本作黃旁抹綱凡例紅旁抹警語要語紅點字義字眼黑抹考訂制度黑點補不足實勉齋例舉其綱爲句如大學之道在明明德在親民在止於至善文意斷爲句如此對小子之學言之也者也相應爲讀如大學者大人之學也文意未斷爲讀如言旣自明其明德又當推以及人使之亦有以去其舊染之汙也覆舉上文爲讀如曰然則此篇所謂在明明德在親民在止於至善者亦可得而聞其說之詳乎上反言而下正爲讀如不親其親不長其長則所厚者薄而無以及人之親長上有呼下字爲讀如中庸何爲而作也子思子憂道學之失其傳而作也下有承上字爲讀如德者本也財者末也續補句讀例並以朱子門人以下諸儒所點修之一曰字是作本書者記當時對面答問之辭者並作句曰字是援引他書他日他人之言止作言字說者並無點有句長欲讀者寧讀於上文仍以曰字連下文一凡呼小子或二三子或參乎對面呼之而欲重其聽者皆爲句一綱在上而目在下者綱爲句目爲讀目盡爲句一目在上而綱在下者諸目皆讀目盡爲句綱獨爲句或下是繳語解語意短急者目盡爲讀一無綱之目並爲讀目盡爲句一無綱之目毎目自有抑揚及自解者解盡爲讀目盡爲句如易三陳九卦則可中庸九經則不可更詳文義所宜一有綱之目毎目自有抑揚及自解者解盡爲讀目盡爲句同前例一上段正下段反或上段反下段正短者可爲讀若是長段反正有然字轉者及有大轉語辭者當爲句一引用他書他人語上有所謂字下有者字急繳歸主意者所引句下者字爲讀繳語盡爲句一凡引他書他人他日及覆舉上文之辭者其中未盡之語爲讀至所引辭盡爲句如所引他書語及事實大長如孟子引齊景公晏子答問各以答問盡處爲句一凡詩銘韻語以韻爲句未至韻皆讀此謂特意全載者若經傳中引者如引書例至引盡處方爲句更詳文義所宜詩經自依章句一凡議論體自然讀多句少一凡叙事體自然句多讀少意未盡者或爲讀亦可一提解經文訓詁某者某也之下意盡者以也字爲句如貼解本意未盡者雖也字亦爲讀至意盡方爲句某也下如揷見章旨者也字别爲句更詳文意所宜一注文釋經訓詁就兼見章㫖必義巳明不再通說經文後卽以大圈斷之者其中章旨未盡小句皆讀意盡爲句如止釋訓詁欲人自玩味經文者不當拘此一以言字通叙貼解一段經文大意者並讀意盡方爲句亦有無言字而意實貼解段意者並同一叙論發明文義本意巳盡爲句其下有繳歸章旨及别貼贊歎勸勉之辭以結者别爲句一上發明所以然下以此字或是字再指上段繳歸所當然或繳歸主意者此字是字上並爲句下段如文意短急者此字是字上爲讀一上發明所以然下以故字繳歸所當然者故字上爲讀如上是長段故字下發意又長者故字上爲句一或問中問目之末何也若何而用力邪奈何亦可得而聞其說之詳乎如之何之類何也之上並讀或何也之上無者字者及句短者不讀或六段內自提問已意何者何哉何則何也之類又自發大段意者何者之上並句發音例並考許叔重說文及鄭夾漈六書略每字有兩音者先依夾漈所正叔重之誤者餘方依叔重先正始音然後依本文音義隨四聲圈發其音義參陸氏經典釋文賈氏羣經音辨大抵以朱子爲主所用點子以果齋史先生法取黑角牙刷柄一頭作點一頭作圈至妙凡金竹木及白角並剛燥不受朱不可用也造法先削成光圓如所欲點大小磨平圈子先以錐子鑽之而後刮之如所欲用丹鉛法點書用丹丹用當日新煎膠調用或揉成鋌子正誤用鉛粉凡有誤處先以墨筆改正誤處調丹粉及黃靑等色或用新晚文義分明爲底却以粉筆蓋之乃塡白米濃煎粥飲濾過不得過宿寫粉上粉乆必脫不如紙貼之爲愈所以必須先調揉成錠子當日曬乾磨用經改正分明者蓋防經乆脫落欲底還乆色不變黑如止調丹書字點可攷也須以鉛粉水浸七日日日攪字用西瓜汁或梨汁尤妙此古動待澄逼去浮水以去鉛氣待盌内書丹法乾却用當日新煎阿膠調揉爲鋌子牛膠乆變黑或云宜用魚膠磨用凡鈔書之法亦須改正底本分明然後剪紙貼之寫淨切不可鏤去誤處爲孔補貼乆之脫去文義不可攷矣切戒貼誤法厚齋王先生親敎云平生所自用者批點韓文凡例廣疊山法議論體一句讀並依點經法一大段意盡黑畫截於此玩篇法一大段內小段紅畫截於此玩章法一小段內細節目及換易句法黃半畫截於此玩句法一論所舉所行事實及來書之目及所以作此篇之故每篇首末常式黑側抹一所論援引他書及攷證及舉制度及舉前代國名青側抹一所論綱要及再舉綱要及或問體問目及提問之語及斷制之䇿黃側抹一義理精微之論黃中抹一凡人姓名初見者紅中抹一繳上文結上文緊切全句或發明于事實之下或先發明事之所以然于事實之上者紅側圈一轉換呼應字及用力字及繳結句內雖巳用紅側圈而字合此例者每字黃側圈於此玩字法一假借字先攷始音隨四聲紅圈一有韻之韻黑側圈一造句奇妙者紅側點一補文義不足反覆提論德行及推說虛叙總述其所以然黑側點譬喻青側點一要字爲骨初見者黃正大圈一要字爲骨再見者黃正大點叙事體一句讀並依點經法一大段意盡黒畫截篇法一大段內小段紅畫截章法一小段細節目及換易句法黃半畫截句法一叙所行事實及年號及人名爵里謚號父祖妻子兄弟等及叙所以作此篇之故銘曰詩曰及每篇首末常式黑側抹一叙敎詔對答之語紅側抹一所叙引援他書及考證及舉制度及舉前代國名青側抹一所叙綱要及再舉綱要及提問之語所提問難事實雖巳用黑側抺而合此例者黄側抹一義理精微之論黃中抹一凡姓名初見者紅中抹一造句奇妙者紅側點一反覆提論其德行及推說其用心而虛叙總述其所以然及補文義不足黑側點一譬喻青側點一繳上文結上文切緊全句或發明于事實之下或先發明事之所以然于事實之上者叙事此例頗少不可強求紅側圈一轉換呼應字及繳結句內雖已用紅側圈而字合此例者每字黃側圈一假借字先攷字始音隨四聲紅圈一有韻之韻黑側圈一要字爲骨初見者黃正大圈一要字爲骨再見者黃正大點刋印日程空眼簿式讀經日程詳見工程專治一書年月日生員一早令倍讀冊首巳讀書起至昨日書一遍太長則分止一面試倍讀昨日書一面授本日書計起字数以約大叚止靣以大段分細段令朱記段數每細叚靣令讀正過句讀字音靣說正過文義一令毎細段先看讀百遍卽又倍讀百遍數足挑試倍讀倍說過面墨銷朱記後段如前段足令通作大起段倍讀試過止一挑試夜間起巳玩索書止一面授說巳讀書就令起反復說大義面試過止一隻日之夜玩起索巳讀書止又玩索起性理書止一雙日之夜以序倍讀起凡平日巳讀書一遍止又溫讀起性理書止一令假日倣定本點向讀圈發字音凡書忘誤處朱記卽𥙷熟墨銷思勉齋讀看史日程五日一周詳見工程年月日生員一日以序倍讀四書經注或問一遍以序倍讀經正文夜讀看性理書幷溫一日以序倍讀本經傳注一遍以序倍讀經正文夜讀看性理書幷溫一日看讀說記通鑑參合看史夜倣點史攷釋文一日看讀說記通鑑參合看史夜溫記史一日看讀說記通鑑參合看史夜溫記史日塡起止思勉齋讀看文日程六日一周詳見工程年月日生員一日以序倍讀四書經注或問一遍以序倍讀經正文夜攷索制度治道書一日以序倍讀本經傳注一遍以序倍讀經正文夜攷索制度治道書一日溫記通鑑以序倍讀經正文夜攷索制度治道書一日讀看玩記文法溫記文法夜鈔點抺截文一日讀看玩記文法溫記文法夜鈔點抹截文一日讀看玩記文法溫記文法夜鈔點抹截文日塡起止及所考所鈔思勉齋小學習字演文日程讀經四日内分一日詳見工程年月日生員一早令倍讀冊首巳讀書至昨日書一遍太長則分一令影寫智永千文楷書約一二十紙寫五七日一易様一以巳讀說小學書作口義呈改上簿一說認記字門類平刀虚實動靜等一漸長學切韻攷字始音偏傍音義假借等一夜以序倍讀巳讀書一遍日塡起止及所看所作思勉齋程氏家塾讀書分年日程卷二
