front:
  text: 跋宋朱子有讀書法六條曰居敬持志曰循序漸進曰熟讀精思曰虛心涵泳曰切己體察曰著緊用力元程畏齋因編爲此書其自稱分年日程一用朱子之意修之如此讀書學文皆辦世之欲速好徑失先後本末之序雖曰讀書作文而白首無成者可以觀矣此法似乎迂闊而收可必之功如種之穫云云元史本傳稱其著有讀書工程國子監以示郡邑校官爲學者式此爲元統三年甬東程氏家塾刊本版心題工程二字卽此書也明初諸儒讀書大抵奉爲準繩淸陸淸獻公平生致力尤多宰靈壽時有覆刻本淸獻跋稱舊板漶漫不勝魯魚亥豕之訛故校而梓之今校是本頗有異同卷一二所標旁證陸本均佚卷三點畫譌舛節陸本僅存卜角壺令玉王六字凡闕三十三字
