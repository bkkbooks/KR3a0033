body:
  text: 王于方切君也于放切君有天下也子將此切男女通稱將吏切子育下民女尼吕切女未嫁稱尼据切以女嫁人妻七奚切與夫齊者七計切以女適人親七鄰切婣也七吝切婚婣相會賔必鄰切客也必吝切客以禮會衣於希切身章也於旣切施諸身冠古桓切首服古玩切加諸身枕章荏切藉首木章鴆切首在木飮於錦切酒將於禁切所以歠麾許爲切旌旗許類切所以使人冰筆凌切水凝彼凭切所以寒物膏古刀切脂凝古到切所以潤物文無分切采章亡運切所以飾物粉夫吻切白飾夫問切所以傅物巾居銀切帨也居吝切所以飾物熏許云切煙出也許運切所以薧物隂於金切氣之濁也於禁切所以庇物采倉宰切取也倉代切所以取食輕去盈切浮也對重苦政切所以自用兩力奬切偶數力讓切物相偶三蘇甘切奇數蘇暫切審用其數左臧可切左手對右臧箇切左右助之右云乆切右手對左尤救切左右助之先思天切前也對後思見切前之卑補支切下對高部止切下之遠雨阮切䟽對近于眷切䟽之離力支切兩也力智切兩之傍蒲郎切近也蒲浪切近之空苦紅切虛也苦貢切虚之沈直金切沒也對浮直禁切沈之重直龍切再也直用切再之數色主切計之也色句切計有多少量龍張切酌之也龍向切酌有大小度徒洛切約也徒故切約有長短高古刀切崇也古到切度高幾許深式金切下也式禁切測深幾許長持良切永也對短持亮切揆長幾許廣古黨切闊也對狹古曠切量廣幾許染而琰切濡也而豔切旣濡折之舌切屈也市列切旣屈别彼列切辨也皮列切旣辨貫古桓切穿也古玩切旣穿縫符容切紩也符用切旣紩過古禾切逾也古卧切旣逾斷都管切絶也徒管切旣絶盡卽忍切極也慈忍切旣極分方云切别也扶問切旣别解古買切釋也胡買切旣釋行戸庚切履也下孟切履迹施式支切行也式䜴切行惠相息良切共也息亮切共助從疾容切隨也秦用切隨後走臧苟切趍也臧候切趍向奔逋昆切趍也逋悶切趍後散蘇亶切分也蘇岸切分布還胡關切回也胡慣切回遶和戸戈切調也胡卧切調絮調徒聊切和也徒䉽切和適凝魚凌切結也牛證切凝固彊其良切堅也其亮切堅固齊徂奚切等也在計切等平延余然切長也余見切長引著陟畧切置也直畧切置定冥彌經切暗也彌定切暗甚塵池珍切土也直吝切土汚煎子仙切烹也子賤切烹乆炙之石切炮也之夜切炮肉收式周切歛也式救切歛之歛力檢切收也力劒切收聚陳池珍切列也直刃切成列呼火呉切聲也火故切大聲悔呼罪切過也呼內切改過如人諸切似也而預切審似應於陵切當也於證切相當當都郎切宜也都浪切得宜帥所律切緫也所類切總人將卽良切持也即亮切持衆監古銜切莅也古陷切莅事者使疏士切命也疏事切將命者援于元切引也于眷切引者障之良切壅也之亮切壅者防符方切禦也符況切禦者任如林切堪也如禁切堪其任中陟弓切任也陟仲切任得宜閒古閑切中也古莧切厠其中足子六切止也子預切益而止勝識烝切舉也詩證切舉之克觀古完切視也古玩切謂視號胡刀切呼也胡到切謂呼爭側莖切鬪也側逬切謂鬪迎魚京切逆也魚映切謂逆攻古紅切伐也古送切謂伐守式帚切保也式救切謂保選思兖切擇也思絹切謂擇聽他丁切聆也他安切聆謂之禁居吟切制也居䕃切制謂之知張離切識别也張義切識謂之思息玆切慮度也息吏切慮謂之評蒲兵切訂也蒲柄切訂語謂之論魯昆切說也魯困切說言謂之便蒲連切欲也蒲練切得所欲謂之好呼皓切善也呼到切嚮所善謂之惡烏各切否也烏路切心所否謂之喜虚已切悅也虚記切情所悅謂之怨於元切尤之也紆願切意有所尤謂之操七刀切持之也七到切志有所持謂之語仰舉切言也牛据切以言告之謂之令力丁切使也力政切所使之言謂之敎古肴切使也古孝切所使之言謂之雨王矩切天澤也王遇切雨自上下種之隴切五榖也之用切謂播種宿思六切止也思宥切日星所止舍生所庚切育也色慶切謂育子乳耳主切生子也而遇切謂飼子吹昌垂切呴也尺僞切謂呴氣烝章升切氣嘘也之勝切謂氣嘘而澤經古靈切東西也古定切東西其緯緣羊專切循也羊絹切循飾其傍編補年切次也步典切謂所列次封甫容切授爵土也甫用切謂所受爵土也載作代切舟車以致物昨代切謂所致物張陟良切陳也陟亮切謂所陳事藏徂郎切入也徂浪切謂物所入處昌吕切居也昌據切謂所居㸑七耑切炊也七亂切謂所炊處柱知庾切支也直主切謂所支木乗食陵切登車也食證切謂其車也卷居兗切曲也居戀切謂曲者祝之六切祭主贊詞者也之又切謂贊詞要伊消切約也於笑切謂約書傳直專切授也直戀切記所授名緜幷切目也緜政切目諸物首書九切頭也書救切頭所嚮蹄杜奚切獸足也大計切足相躗始式氏切初也對終之稱式志切緩言有初聞亡分切聆聲也亡運切聲著於外稱尺烝切舉也尺證切舉事得宜譽羊諸切偁也羊洳切稱名當體平蒲兵切均也蒲柄切品物定法治直基切理也直吏切致理成功衷陟弓切中也陟仲切處事用中裁音才制也音在體制合宜勞力刀切勩也力到切賞勩勸功興虚凌切舉也許應切舉物寓意累力水切連也力僞切牽連爲敗與羊主切授也余慮切授而共之比卑履切近也毗志切近而親之難乃干切艱也乃旦切動而有所艱繫古詣切屬也胡計切屬而有所箸爲于嬀切造也于僞切造而有所徇遲直尼切緩也直利切緩而有所待妨敷芒切疐也芳亮切置而有所疐屬章玉切聮也時玉切聮而有所係享呼兩切獻也呼亮切神受其獻棺古桓切柩也古患切以棺歛緘古咸切束也古陷切齊謂棺束含胡南切實口中也胡紺切謂口實遣苦演切送也苦傳切送終之物引以忍切曵也余刃切曵車之紼臨良㝷切莅也力禁切哭而莅喪彼此異音辨假古雅切取於人也古訝切與之借子亦切取於人也子夜切與之乞去訖切取於人也去旣切與之貸他得切取於人也他代切與之壞音怪毀之戸怪切自毀敗音拜毀之薄邁切自毀毀許委切壊他況僞切自壞風方戎切上化下方鳯切下刺上見古甸切上臨下又視之胡甸切下朝上文示之吿古祿切下白上古報切上布下養餘兩切上育下餘亮切下奉上共九容切上賦下九用切下奉上遺以追切有所亡羊季切有所與施式支切設之羊至切及之更古衡切因故而改古孟切捨故而作去羌舉切除之丘倨切自離畜敕六切聚謂之許六切養謂之喪息郞切死亡也息浪切失亡也忘無方切意遺無放切意昏巧苦絞切善功苦教切僞功恐丘隴切懼之急丘用切緩也還音旋又音全復之速戸關切緩也射神亦切命中也神夜切以禮也取七與切制師從巳七句切屈巳事師仰魚亮切上委下語兩切下瞻上大徒蓋切凡廣也他蓋切其極也少施沼切凡微也施詔切其降也焉於乾切何也常居語辭于乾切巳也常居語末㑹胡沛切相合吉內切聚合披鋪卑切開謂之鋪彼切分謂之播𥙷我切揚謂之𥙷過切布謂之降古巷切下謂之戸江切伏謂之覆甫六切傾也敷救切蓋也樂五角切聲和也力各切志和也朝陟遙切旦曰也直遙切旦見也食時力切餐謂之音寺餉謂之涕他禮虜啓二切又音弟目汁也他計切鼻汁也刺七亦切剚謂之七賜切傷謂之奉扶勇切承也音捧拱也父音甫人之美稱扶雨切家之尊稱被音披箸謂之平義切覆謂之合古盍切牽和也胡閤切自和也字音疑混辨上時亮切居高定體時掌切自下而升下胡賈切居卑定體胡嫁切自上而降夏胡賈切四方廣大胡嫁切萬物盛大後胡苟切居其後胡垢切從其後近巨隱切相隣也巨刃切相親也被部委切所以覆者部僞切所以覆之右在字后字坐字聚字若此類字書皆有上去二聲雖爲疑混而釋文義無他别不復載之假借序夾漈鄭樵六書之難明者爲假借之難明也六書無傳惟藉說文然許氏惟得象形諧聲二書以成書牽於會意復爲假借所擾故所得者亦不能守焉學者之患在於識有義之義而不識無義之義假借者無義之義也假借者本非巳有因他所授故於巳爲無義然就假借而言之有有義之假借有無義之假借不可不别也曰同音借義曰恊音借義曰因義借音曰因借而借此爲有義之假借曰借同音不借義曰借恊音不借義曰語辭之借曰五音之借曰三詩之借曰十日之借曰十二辰之借曰方言之借此爲無義之假借先儒所以顚沛淪於經籍之中如汎一葦於溟渤靡所厎止皆爲假借之所魅也嗚呼六書明則六經如指諸掌假借明則六書如指掌同音借義初裁衣之始而爲凡物之始基築土之本而爲凡物之本始女子之初而爲凡物之初本木之基而爲凡物之基小水之微也凡微者皆言小永水之長也凡長者皆言永牛爲牝牡而牝牡通於畜獸隹爲雌雄而雌雄通於鳥雀狀本犬之形而爲凡物之狀物本牛之事而爲凡事之物駕馬言駕凡驅乗皆曰駕牧牛言牧凡豢養皆曰牧落木曰落而爲墮落之落零雨曰零而爲飄零之零英本英華之英而爲飾物之英苦本苦良之苦而爲滋味之苦蔓本藤蔓之蔓而爲蔓衍之蔓爻乃交疏之爻而爲爻象之爻希乃疎巾之希而爲希少之希柞本柞木之柞而爲芟柞之柞鑿本金鑿之鑿而爲䟽鑿之鑿旋反斾也而爲回旋之旋戲兵交也而爲嬉戲之戲平气之平也而爲均平之平封爵土之封也而爲封殖之封戚斧也而爲親戚之戚塵土也而爲塵積之塵賢多財也而爲賢良之賢妃嘉偶也而爲后妃之妃純絲也而爲純全之純茸草也而爲尨茸之茸珣夷玉也而玉器亦謂之珣蘆葦也而薺根亦謂之蘆饒食之餘也而爲饒衍之饒約絲之束也而爲儉約之約凡此之類並同音借義者也右三十五借同音不借義汝水也而爲爾汝之汝爾花盛也詩彼爾維何維常之華而爲爾汝之爾示旗也而爲神示之示業大版也而爲事業之業牢牛圈也而爲牢固之牢畜田畜也而爲畜聚之畜它蛇屬也而爲它人之它蚤風類也而爲蚤夜之蚤爲母猴也而爲作爲之爲率鳥畢也而爲率循之率來麥也而爲來徃之來易蟲屬也而爲變易之易能熊類也而爲賢能之能黽鼃也而爲黽勉之黽翁毛也而爲翁老之翁題額也而爲題名之題薄本林薄之薄而爲凉薄之薄茀本茀茂之茀而爲茀祿之茀登豆也而爲升登之登干盾也而爲干犯之干革皮也而爲更革之革鞠革囊也而爲鞠養之鞠難禽也而爲難易之難雍禽也而爲雍和之雍溱水也而爲室家溱溱之溱棣栘也而爲威儀棣棣之棣丁當也而爲椓之丁丁之丁薨卒也而爲度之薨薨之薨胥蟹醢也而爲相胥之胥方並舟也而爲方所之方節竹目也而爲節操之節管竹筩也而爲主管之管韋相違也而爲皮韋之韋貿相易也而爲􅉩矇之貿禮貿貿然來休憩也而爲休美之休財貨也而爲財成之財易財成天地之道齎財之齎而爲齎咨之齎易齎咨涕洟時辰之時而爲時是之時晉先明也而爲晉國之晉夢寐也而爲雲夢之夢風虫之風而爲吹嘘之風字養之字而爲文字之字勿州里之旗也而爲勿不之勿岀花英也而爲出入之出乆距也而爲乆遠之乆凡此之類並同音不借義者也右四十五恊音借義旁之爲去聲中之爲去聲上之爲時掌切下之爲胡嫁切分之爲去聲少之爲去聲歸之爲音饋遺之爲惟季切與也御之爲迓爲禦行之爲下孟切戸浪切數色主切之爲尸故切色角切趨之爲七六切側九切春秋傳賔將趨鄭康成讀咽之爲音燕又一結切蕃音藩樊也之爲音煩蕪之爲亡甫切徹通也之爲直列切斂之爲去聲蔓藤也之爲莫干切蔓菁吹之爲去聲呼之爲去聲又呼賀切春秋傳呼役夫噍才笑切嚼也之爲音焦禮志微噍之音又子流切禮燕雀啁噍之頃否之爲音鄙臧否部鄙切否泰喧之爲上聲詩云赫兮喧兮趣之爲平聲又七口切周官有趣馬幾居希切之爲音冀春秋傳庸可幾乎文渠希切近也樂之爲五敎切又音洛華今作花之爲音譁榮也又去聲聚也鄼作管切聚也之爲音賛南陽縣名在河切沛縣名空之爲音孔窟也又苦貢切詩不宜空我師從之爲才用切又七容切從容閒暇也比毗至切之爲音皮和也上聲方也蒲必切次也音芘朋也放之爲上聲敖音遨之爲音傲背脊也之爲音佩違也衡橫木之爲音橫筍之爲私閏切筍輿也塞之爲去聲塞垣奇之爲居宜切奇偶嘉之爲戸嫁切春秋傳公賦嘉樂枝之爲音岐栽之爲音在築也回古文雷字之爲亦作廻繞也暴步卜切灼也之爲去聲虐也粢稷屬之爲才細切禮粢醍在堂元音咨鹽之爲去聲定之爲丁侫切詩定之方中仰之爲去聲幷之爲去聲伏之爲去聲禮羽者嫗伏毛者孕育裨補支切之爲婢支切副也厭之爲去聲辟必益切君也之爲蒲益切法也覺之爲古孝切夢覺也騶之爲仕救切麗之爲力之切詩云魚麗于罶靡之爲平聲閒之爲去聲援之爲平聲引也折之列切之爲士列切女之爲尼句切妻之爲去聲姓之爲音生春秋傳蔡公孫歸姓孫之爲音遜純之爲之尹切緣也緫之爲子公切詩素絲五總織之爲隻吏切徽也詩織文鳥章累之爲力僞切土之爲音杜詩徹彼桑土壞之爲音怪錢之爲上聲詩庤乃錢鎛鍼音針之爲其兼切親之爲去聲婚婣相謂賔之爲去聲客以禮會曰賔衣之爲去聲冠之爲去聲枕之爲去聲飮之爲去聲食之爲時吏切膏之爲古到切詩羔裘如膏熏之爲去聲隂之爲去聲輕之爲去聲春秋傳戎輕而不整離之爲去聲兩之爲去聲詩葛屨五兩沈之爲去聲量之爲去聲三之爲去聲論語三思而後行左上聲之爲音佐右上聲之爲音佑先之爲去聲後之爲去聲逺之爲去聲近之爲去聲復之爲扶又切重平聲之爲去聲度之爲徒洛切長之爲去聲廣之爲去聲染之爲去聲縫之爲去聲别彼列切之爲皮列切斷都管切之爲徒管切盡卽忍切之爲慈忍切解之爲胡買切通也相之爲息亮切走之爲去聲書矧咸奔走奔之爲逋悶切散之爲去聲和之爲去聲凝之爲去聲冰之爲彼凭切彊之爲其亮切箸之爲陟畧切直畧切施之爲式豉切以豉切冥之爲去聲煎之爲去聲炙之爲之夜切收之爲式救切當之爲去聲悔之爲去聲應平聲之爲去聲帥之爲所類切監之爲去聲使之爲去聲守之爲去聲任之爲平聲勝之爲平聲爭之爲去聲迎之爲去聲選之爲去聲聽之爲平聲論之爲平聲知之爲音智思之爲去聲便之爲平聲好之爲去聲令之爲平聲敎之爲平聲語之爲去聲怨之爲平聲衆之爲平聲雨之爲去聲種之爲去聲緣之爲去聲張之爲去聲藏之爲去聲處之爲去聲乗之爲去聲卷之爲上聲祝之爲之又切傳之爲去聲聞之爲去聲稱之爲平聲譽之爲平聲勞之爲去聲興之爲去聲與之爲去聲繫之爲古詣切遲之爲去聲屬之爲章玉切含之爲去聲遣之爲去聲禮有遣奠引以忍切之爲余刃切臨之爲去聲假之爲古訝切春秋傳不以禮假人借之爲入聲貸之爲入聲敗之爲音拜見之爲胡甸切告之爲古祿切禮出必告養之爲去聲共之爲音恭去之爲上聲喪之爲去聲忘之爲去聲恐之爲丘用切射之爲食亦切取之爲七句切禮聞取於人大之爲音泰焉之爲於乾切㑹之爲音檜披之爲上聲降之爲戸江切覆之爲甫六切朝之爲直遙切刺之爲入聲奉之爲音捧父扶雨切之爲音甫子之爲將吏切禮子庶民也凡此之類並恊音而借義者也右二百八借恊音不借義荷之爲胡可切負也茹茹藘切茅蒐也之爲去聲度也鮮之爲上聲少也燕之爲平聲薄之爲必各切迫也菑側其切田也之爲音災竟之爲音境苴七余切麻也之爲子餘切包苴旁之爲補彭切詩四介旁旁屯之爲徒門切莫音暮之爲模各切又音陌春秋傳德正應和曰莫个之爲音介副也禮明堂有左右个又音幹禮人爲侯上兩个與其身三召之爲音邵番附袁切獸足之爲音翻次也音波番番勇也句之爲古侯切又古侯切詩敦弓旣句台音怡我也之爲音胎星名又音臺春秋季孫宿救台范寗讀咽之爲音淵詩伐鼓咽咽調之爲徒弔切品調又陟留切詩云惄如調飢登之爲音得春秋登來正音征射侯之正也之爲去聲邪琅邪地名之爲邪正之邪追之爲丁回切追琢也徼古堯切之爲古弔切邊徼訏之爲栩詩川澤訏詩說之爲音悅識之爲音志信之爲音伸樊之爲音盤樊纓革之爲紀力切急也殺之爲去聲降殺占之爲去聲甫之爲音圃甫田省昔井切之爲所景切雅今作鴉之爲上聲瞿九遇切驚也之爲平聲㦸類鳥之爲音島脩脯也之爲音卣中尊肺之爲音沛詩其葉肺肺脫之爲音退詩舒而脫脫兮創音瘡傷也之爲去聲予之爲音與委之爲於僞切委積女之爲音汝削之爲音肖刀室箾音簫之爲音朔象箾以舞簿𧖟曲之爲簿書平之爲辨年切盛音成之爲去聲索之爲生革切稽之爲音啓稽首鄉之爲音嚮昭之爲音韶游之爲音流旗游也旋之爲音選鍾縣盟之爲音孟盟津貫之爲古患切習也栗之爲音裂菑栗也齊之爲音咨齊衰冒之爲莫北切貪也俾之爲普計切俾倪北音佩之爲入声方也屏之爲上聲兄之爲況詩倉兄塡兮弁之爲蒲官切詩小弁縣平聲之爲去聲驕之爲許喬切詩載獫歇驕薦之爲音荐詩天方薦瘥麇麞也之爲丘隕切衆也扃之爲上声春秋我心扃扃閒之爲音閑耿工迴切光也之爲古幸切耿耿憂也拒之爲音矩招拒白帝振之爲平聲詩振振公子揖之爲子入切詩螽斯羽揖揖兮蟄之爲尺十切詩宜爾子孫蟄蟄兮紀之爲起詩有紀有堂縱之爲平聲絮之爲敕慮切礼母絮羮繆之爲音穆謚也絀音屈之爲音絀軒之爲音憲礼野豕爲軒隊之爲音墜斤之爲紀覲切斤斤明也險之爲音儉春秋傳險而易行舍之爲音捨王于况切之爲平聲宿之爲思宥切星也要之爲去聲風之爲音諷夏胡賈切中夏也之爲胡嫁切冬夏也鞠毬也之爲音麴又音芎鞠藭卷之爲音衮礼三公一命卷又音拳禮執女手之卷然又起權切冠武也鬻亦作粥之爲音育賣也居六切詩鬻子之閔斯殿音奠之爲丁見切又音店詩民之方殿屎將之爲去聲又七羊切詩將仲子敦之爲都隊切玉敦又都回切詩敦彼獨宿徒本切渾敦肉之爲而救切禮寛𥙿肉好之音而注切豐肉而短膴凶武切大臠之爲亡古切詩則無膴仕音膜詩民雖靡膴從之爲則庸切從衡七容切從容又音縱又音緫礼爾無從從爾耆之爲音嗜又音底衰衰絰之爲楚危切等衰文衰微貉之爲音陌狄也又音禡辟必益切君也之爲音避又音弭止也又音禆礼素帶終辟又音僻禮負劒辟咡厭於鹽切之爲於葉切詩厭浥行露又音壓禮死而不弔曰厭於驗切服也率捕鳥之具之爲將帥之帥亦作率又音律約也凡此之類並恊音不借義者也右一百三十三因義借音琢本琢玉之琢而爲大圭不琢之琢音篆輅本車輅之輅而爲狂狡輅鄭人之輅音迓惡以有惡也故可惡去聲内以其内也故可内音納佚夷質切縱也而爲佚宕之佚音迭伯長也而爲伯王之伯音覇幬帳也而爲覆幬之幬音燾春秋傳如天之無不幬幕帷也而爲幕覆之幕音覓蓼本葒蓼之蓼而爲蓼彼䔥斯之蓼力竹切錞本金錞之錞音淳而爲厹矛沃錞之錞徒對切術邑中道也以其所行故爲郷術之術音遂嬴秦姓也以其所居故爲嬴水之嬴音爲嘨嘨呼之嘨而爲指嘨之嘨音叱跛跛躃之跛彼我切而爲破倚之跛彼義切副普逼切剖也而爲副貳之副承奉也而爲賻承之承音贈甄吉然切本甄陶之甄而爲聲甄之甄音震孔薄聲甄封本封土之封而爲封棺之封音窆禮縣棺而封齊本齊一之齊而爲齊莊之齊側皆切廵本廵行之廵而爲相廵之廵音緣礼始終相廵推本推与之推而爲推挽之推土回切摶本摶攝之摶徒端切而爲摶束之摶除轉切禮百羽爲搏獻本獻享之獻而爲獻尊之獻素何切衰本雨衣之衰素何切而爲衰絰之衰音崔撬本音毳以其義通於橋故又音橋凡此之類並因義借音右二十五因借而借難鳥也因音借爲艱難之難因艱難之難借爲險難之難去聲爲母猴也因音借爲作爲之爲因作爲之爲借爲相爲之爲去聲射本射御之射因義借爲發射之射食亦切因發射之音借爲無射之射音亦律名斁本厭斁之斁羊益切因義借爲斁敗之斁多路切書彞倫攸斁因斁敗之音借爲斁墍之斁音徒書惟其斁墍茨亨音享本饗也因義借爲亨飪之亨普庚切因亨飪之音借爲亨嘉之亨來本麥也因音借爲徃來之來因徃來之義借爲勞來之來音賚矜本矛柄也因音借爲矜憐之矜因矜憐之義借爲矜寡之矜音鰥適徃也因音借爲適責之適音謫詩勿予禍適因適責之音借爲適匹之適音敵禮大夫計於同國適者參七南切閒厠也因義借爲參差之參楚金切因參差之音借爲參伐之參所金切邪本琅邪之邪因音借爲語辭之邪因語辭之義借爲虚邪之邪音徐詩其虛其邪食本啖食之食因義借爲飮食之食音伺因飲食之食借爲食其之食音異費本費用之費因音借爲費邑之費音秘因費邑之義借爲費氏之費扶未切崔本南山崔崔之崔子惟切因義借爲崔嵬之崔慈回切因崔嵬之音借爲崔氏之崔音催不本鄂不􅙽􅙽之不音趺因音借爲可不之不音否因可不之義借爲不可之不音弗塡本塡塞之塡因義借爲塡壓之塡音鎭因塡壓之音借爲塡乆之塡音塵詩倉兄塡兮罷本罷置之罷因義借爲罷困之罷音疲因罷困之音借爲罷辜之罷鋪逼切禮以罷辜祭四方質本質幣之質音贄因義借爲交質之質音至因交質之音借爲形質之質畜本田畜之畜敕六切因音借爲畜養之畜許六切因畜養之義借爲六畜之畜許又切治平聲水也因音借爲治理之治因治理之義借爲平治之治去聲乞氣也因音借爲與人之乞音氣因與人之義借爲求人之乞入聲能奴來切獸也因義借爲能鼈之能三足鼈因能鼈之音借爲能事之能音耐又爲三能之能音台凡此之類並因借而借右四十三語辭之借序曰書者象也凡有形有象者則可以爲象故有其書無形無象者則不可爲象故無其書語辭是也語辭之用雖三詩之借風本風䖝之風雅本烏鴉之鴉頌本顔容之容右三詩五音皆聲也聲不可象並因音而借焉右三十日之借甲本戈甲乙本魚腸丙本魚尾丁本蠆尾戊本武也己本几也庚鬲也辛被罪也壬懷妊也癸草木實也右十十二辰之借子人之子也丑手之械也寅臏也卯牖也辰未詳本義巳蛇屬也午未詳本義未木之滋也申持簡也酉卣也戍與戊戚同意亥豕屬也十日十二辰惟巳亥有義他並假借以曰辰之類皆虚意難象故因音而借焉右十二方言之借鮦之爲鮦音胄鮦陽縣名歜之爲歜上音觸下徂感切昌歜也昌蒲也覃之爲覃上如字下音剡詩以我覃耜羹之爲羹上如字下音郎楚地名咎之爲咎上如字下音臯皐陶字榖之爲榖奴走切楚人謂乳榖枹之爲枹上必茅切下音桴鼓桴也敦之爲敦音燾禮每敦一几又爲敦音彫詩敦弓右九雙音並義不爲假借陶陶冶臯陶鵰都聊切隼類陟交切鶻鵰鴝鵒駣徒刀切馬四歳曰駣他彫切馬三歲曰駣鷂以照切音遙雉也杷補訝切枋也白加切收麥器榮永兵切桐也音營屋榮枸音苟枸杞音矩枳枸椹知林切禮射甲革椹實食甚切桑實也校古孝切木囚也巨敎切木闌也幅音福布帛之劑音逼行縢也幓所銜切旂幅也七消切頭括髮檀音但袒裼也張彥切后六服有檀衣被部委切寢衣也普義切春秋傳翠被豹舄衿居吟切領也其鴆切結也褏音袖袂也由救切盛服也凡此之類皆是也右三十凡此借類計五百九十八論急慢聲諧急慢聲諧者慢聲爲二急聲爲一也梵書謂二合聲是矣梵人尚音有合二合三合四成聲者華人尚文惟存二合詩序曰聲成文謂之音知聲有急慢則發而爲文抑揚合度鏗鏘中節箋釋之家全不及此至於語辭渾而無别但取言中之義不問句中之節故柳宗元極論語辭之義良由不知急慢之節所以辭與句不相當如慢聲爲者焉急聲爲􅏧旃爲者焉之應如者與之爲諸而已之爲耳之矣之爲只者也之爲者也者急聲爲也嗚呼之爲嗚噫嘻之爲嘻皆相應之辭也論高下聲諧音讀附董正之董亦爲督察之督者東董凍督故也改更之更亦爲變革之革者更梗更去聲革故也伊之爲已大誥曰巳予惟小子巳之爲億易曰億喪貝又曰億無喪有事伊已意億故也非之爲匪匪之爲弗非匪沸弗故也眅卽盻者攀眅盻故也儆類敬者京儆敬故也翻之爲反庸之爲用邪之爲也之之爲只者並此道也而之爲爾爾之爲汝汝之爲若于之爲於於之爲與與之爲與音譽亦此道也是皆一義之所起而發聲有輕重耳乃若父雖甫音讀若輔道雖杜老切讀若導禮記大昕昕音忻讀若希說文臑字音懦讀若襦字特一切讀若亭此爲音讀之别無非聲之諧也論諧聲之惑左氏曰止戈爲武武非从止凡沚芷齒耻之類从止武从戈从亾从戈見其義从亾見其聲古文歌舞之舞作振撫之撫作廊廡之廡作古並从亾今並从無於篆文亦从亾則武之从亾又何疑焉若曰武有止戈義又何必曰偃武乎亾之與止易得相紊左氏所見止之訛武於六書爲諧聲武戈類也武之从亾亦猶戰之从單音善戮之从翏音六戢之从咠音緝戣之从癸皆聲之諧也禮記曰祖者且也祖非从且凡罝姐之類从且徂祖之類从且音徂祖無且義凡此之類皆不識諧聲論象形之惑左氏曰反正爲乏正無義也正乃射侯之正音征象其形焉正音征以受矢乏以藏矢其義在此或曰反正爲丏音沔丏蔽矢短墻也正以受矢丏以蔽矢此亦反正爲乏之義邪正之正無所象故正用侯正音征之正邪用琅邪之邪並恊音而借是爲假借之書也韓子曰自營爲厶音私厶非自營之義也厶於篆文作象男子之勢故又音鳥與同即了字故厶勢下垂了狀槌上並是象形之文若乃自營之厶與了絕之了並同音而借亦爲假借之書疊古作曡祭肉之積在器也从冝祭器也以晶象積肉之形曡與豐同意豐亦爼豆之衍也揚雄以曡爲古理官决罪三日得其宜乃行故以三日从宜此亦爲不識象形者也何用識奇字之多乎能象熊之形許氏謂能熊屬則可矣又曰賢能之能何也岀象花英之形許氏謂象艸木益滋上出亦可矣又曰出進何也是皆惑象形於假借者也三代之前有左氏韓子三代之後有揚雄許愼猶不達六書之義況他人乎論子母立類爲母從類爲子母主形子主聲說文眼學廣韻耳學說交主母而役子廣韻主子而率母說文形也禮也廣韻聲也樂也說文以母統子廣韻以子該母說文定五百四十類爲字母然母能生子不能生今說文誤以子爲母者二百十類且如句類生拘鉤􅓒類生㮚㮚半類生胖叛菐類生僕䑑拘當入手類鉤當入金類則句爲虛設㮚當入木類㮚當入米類則􅓒爲虛設胖當入肉類叛當入反類則半爲虛設僕當入人類䑑當入臣類則菐爲虛設蓋句􅓒半業皆子也子不能生是爲虛設夾漈作象類書總三百三十母爲形之主八百七十子爲聲之主合千二百文而成無窮之字故去許氏二百七而取其三百三十也論變更對舊作􅍟漢文以言多非誠故去口隋舊作隨文帝以周齊不遑寧處故去辵疊舊作曡新室以三日太盛改爲三田􅚷舊作騧宋明以咼音喎類禍改而爲瓜形影之影舊作景葛稚川加彡於右軍陣之陣舊作陳主逸少去東从車尼丘之山三倉合而爲丘尼音尼章貢之水後人合而爲贛音紺荒昏二義元次山謚隋煬帝合而爲音荒鄗火各切本一名分而爲高邑者漢光武也鄚嫌近鄭更而爲莫豳嫌近幽更而爲邠此並唐明皇所更也論遷革雅本鴉字今復有鴉字遂以雅爲雅頌之雅後人不知本音鴉字雇本九鳸之鳸借爲雇賃之雇今復有鳸字後人不知本爲鳸也頌本顔容借爲歌頌之頌今人見頌知爲歌頌之頌而巳安知本是容泉本貨錢之錢故於篆象古刀文借爲泉水之泉今人見泉知爲泉水之泉而已安知本爲錢字徐鉉奏俗書譌謬不合六書之體者二十九字斖个暮熟捧遨廻腰嗚慾揀俸影斌恱藝著墅蓑賾黌黈麌池徘徊鞦韆矗字音正譌用說文切車尺遮切軻康我切輔扶雨切治平聲濟子禮切洗蘇典切洒先禮切溺而灼切汶亡運切浣胡玩切灑山䜴切泌兵媚切漚烏候切湛宅減切他徒河切儷平聲譔此緣切謾母官切訂他頂切誖蒲沒切它託何切柩巨救切恃時止切鋪普胡切錢卽淺切蕩徒朗切頃去營切峙直离切婢便俾切婦房九切母莫后切靄於蓋切掃蘇老切在昨代切燠烏到切煖況袁切罷薄蟹切陛旁禮切附符又切酢倉故切醋在各切打都挺切擠子計切挂古賣切摘他歷切搦尼革切唯以水切壽直由切唖於革切趍直离切料洛蕭切事鉏史切賈公戸切号胡到切號乎刀切核古哀切槧自琰切梭私閏切盻胡計切散蘇旰切盼匹莧切腥蘇侫切篰簿口切覇普伯切孛蒲妹切曾昨稜切過古禾切造七到切紹市沼切緯云貴切紂上聲繆平聲館古玩切劾胡槩切草自保切予余呂切能奴來切示音祈豈苦亥切弟特計切探它含切懦人朱切鬌直追切燄以冉切扣苦后切不方乆切負房九切旱乎旰切暵呼旰切統去聲篠徒弔切聚才句切噫於介切紊亡運切蕈徒念切徯胡計切尿奴弔切嗌伊昔切副芳逼切假古額切泉古錢字創楚良切作瘡非㨔胡感切作撼非媆奴困切作嫩非部位雜記折艸部卒衣部皁古草爲皁嗟言部於古文鳥字苻合从竹朞卽期字叩元扣砠元从山服元从舟柴㧘拒本歫字止部糕說文从禾玉篇从禾从示菟說文作虎虎部葸說文無玉篇有妙本玅說文女弦部玉篇玅部乞古气字借入聲點畫譌舛牛言言音音卜卜角角竹丹井丼矢之出㞢生宏突穾偁使欠頁包壷才手糸恒力阝􅊟左右令令人入入人比厸丘丠冫冰少小玊王王王今鷹非犬今犭非朱子答楊元範有云大有亨享二字據說文只是一字故易中多互用亨如王用亨于岐山亦當爲享如王用享于帝之云也字書音韻是經中淺事故先儒得其大者多不畱意然不知如此等處不理會却枉費了無限辭說牽補而卒不得其本義亦甚害事也非但易學凡經之說無不如此獨恨早衰無精力整頓得耳字學說文爾雅字說字林三蒼呉楚音辨呂靖韻集夏侯該韻略楊休之韻略周思言音韻李秀節音譜杜臺卿韻略玉篇唐韻丁度集韻唐藝文志音隱音略音義音訓音鈔釋音辨證辨疑辨嫌辨惑辨字注辨論字說三顧隱客蕭楚字子荆號淸節先生象形日从口从一陽數月有盈虧從口而闕之从二而仄隂數遡於陽而不得其正也田象四口十阡陌之制卜象龜兆從橫冊從五畫直下象其枚數中有聮綴王氏只以字爲象形非也乃氣生出之難公羊曰乃難辭也屮象物初出有枝莖指事直箸其事視而可知也人目爲見鼻臭爲齅兩戸相向爲門兩手丅爲拜丅古下字土木示爲古社字矢耳爲聅以矢貫耳刀耳爲刵王居門爲閏會意合文以成其義言欲其順故口䇂音愆爲言䇂从丄古上字从干爲䇂口䇂爲言止戈爲武力田爲男女帚爲婦人言爲信人爲爲僞吏於人爲使反於后爲司后無司則有爲諧聲本一字以定其體而附他字以諧其聲江河鵝鴨江河左从水以定其體而諧聲在右鵝鴨右从鳥以定其體而諧聲在左裠裳諧聲在上簾箔諧聲在下園圃諧聲在内徽輿諧聲在外徽三紏繩也故从系从微省聲若江河以工可字諧聲者取其聲之同母字也及草之類从艸木之類从木金之類从金土之類从土而附他字以諧聲者是轉注同意相受考老字是此說非也古之人於文有解釋其意義謂之轉注者本一字更有意義可轉用也有一轉爲二聲用者有再轉爲三聲用者有至四聲而皆有義者長本長乆字長則物莫先焉故又爲長㓜之長長則有餘故又爲長物之長行本行止字行則有蹤跡故又爲德行之行行則有次序故爲周行之行又子路行行之行無義也以聲相近而用之假借也齊整齊也專一人之意齊音齋如故爲之齊戒之齊齊則適等無過不及有調適之意故爲酒齊刀劒齊之齊令又爲使令之令乾卦名陽也故爲乾熯之乾數一二之名有數則可數故又爲數徃之數有數則􅣊矣故又爲疎數之數又音促數罟亦密罟也亦轉注也凡此之類皆聲轉而各有義故曰轉注又有本其意特轉聲用之者以女爲人妻謂之妻以女妻人曰女指所載之物統曰載昨代切不輸爾載如此類本皆無其字時人有是語故原其意轉聲而用也此類字不爲假借者本其意故也假借本無其字原它字聲意而借用之亦有只借聲而用之者先儒謂令長字是非也能本獸之軼材者賢能之能借用之豪本獸之威猛者豪傑之豪借用之俗作毫非正如碧是碧玉之碧玉之碧色者萇弘血化爲碧故碧从石用爲碧系之之系與此正同皆假借也震劈歷也動物亦物之所懼故爲地震之震文爲震來􅊒虩之震須髭也鬚無實用不可無故爲須待之須文爲須用之須此類倂其聲意借用之也旃古人止語思語始卒之辭旃旗也指揮之用也故􅏧爲指物之辭詩曰舍􅏧舍此也思屬土五行成於土五事成於思故思爲語始卒之辭思樂泮水始語也不可度思卒語也此類亦當時有是語故爲文者原其字意亦因其聲而用之也不然旃旟皆旗何獨取於旃思私同音何獨取於思尊尊彞也又爲尊卑之尊卽酒尊字古者大酋主酒周官用此後人始有從木从缶以尊或有瓦木也如刑鼎古人亦用刑字後人始用鉶雅禽也俗作鴉又爲風雅之雅古疋字如此象獸也又爲彖象之象此類只借其聲用之也以氷爲掤也所以覆矢可以飮抑釋氷忌古人通氷字以糜爲湄居河之麋水草荒穢處以來爲䅘來牟先儒謂來本瑞麥天所來故用徃來之來非也周以前有來字易以盍爲合以羸爲纍此類亦借其聲而已於字無義也又以定爲顁顁額麟之定古人通用常爲棠棠棣借爲常害爲曷害澣彭爲旁匪其彭居爲其何居此類皆古人因其聲相近而借用之於字亦無義也所謂六書之體可攷見者如此豈盡是會意字字可說哉爾雅飛類謂之雌雄走類謂之牝牡故雌雄字从隹羽族也鳥短尾總名隹牝牡字从牛毛屬也書以越字爲始語詩以侯字維字爲始語楚辭以蹇字羗字爲始語易以若字如字爲止語之辭詩以只字且字爲止語楚辭則些字又日居月諸叔善射忌音旣聊樂我員音云皆當時之語爲文者借字聲而用之今所傳六經之文有異於漢儒所傳之文營營靑蠅作謍謍勿拜作扒㧞也噬肯作逝肯衣裳􅮽􅮽音楚五色鮮明桃之枖枖平豑東作西伯􅨹黎泉陶臯顚木有枿㽕木再生條也後人傳寫脫弓字遂作由說者云由枿非也當作㽕見說文我興受其䢙旁逑孱功是今文有非漢儒所傳之文漢儒榖書方榖訓祿詩榖則異室訓生榖旦訓善薰香草葷臭同一音古文以赤爲尽桼爲七皆是借聲用字古易羝羊觸藩纍其角系纍不能進纍其瓶之義亦然系纍其瓶故致傾覆不能上水今之說者未見古本又如以盍爲合彭爲旁繻爲濡疑皆傳錄之誤繻有衣袽當作繻一二三四五六七八九十演而之至於不可窮詰凡天地之運行四時之代謝日月星辰之進退九州萬物之繁夥果不逃其數可以窮變化而行鬼神功用抑大矣世人皆云蒼頡所造而曾不究其旨方伏羲畫卦仰則觀天而畫一俯則觀地而畫二中則觀人而畫三觀四方而得四觀天地之氣交午而得五以至六七八九十亦莫不然始於三畫分爲八卦九六藏於中則知此十字非伏羲畫卦時爲之不可蒼頡但能因此而字之如人之字育爲之滋長變出他文學者當細攷之不可以常字觀近王荆公畱心字學皆爲之解釋至此十字却無贊辭要之如日月星辰十干十二支金木水火土首目口耳手足山石蟲鳥等正字非聖人不可作蒼頡體其意以從偏傍而字之耳雲麓謾鈔正始之音畢朱子學校貢舉私議古者學校選舉之法始於鄕黨而達於國都敎之以德行道藝而興其賢者能者蓋其所以居之者無異處所以官之者無異術所以取之者無異路是以士有定志而無外慕蚤夜孜孜唯懼德業之不脩而不憂爵祿之未至夫子所謂言寡尤行寡悔祿在其中孟子所謂脩其天爵而人爵從之蓋謂此也若夫三代之敎藝爲最下然皆猶有實用而不可闕其爲法制之密又足以爲治心養氣之助而進於道德之帰此古之爲法所以能成人材而厚風俗濟世務而興太平也今之爲法不然雖有鄉舉而其取人之額不均又設太學利誘之一塗監試漕試附試詐冒之捷徑以啓其奔趨流浪之意其所以敎者旣不本於德行之實而所謂藝者又皆無用之空言至於甚弊則其所謂空言者又皆怪妄無稽而適足以敗壞學者之心志是以人材日衰風俗日薄朝廷州縣每有一事之可疑則公卿大夫官人百吏愕眙相顧而不知所出是亦可驗其爲敎之得失矣而議者不知其病源之所在以程試文字之不工爲患而唱爲混補之說以益其弊或者知其不可又欲斟酌舉行崇寧州縣三舍之法而使歳貢選士於太學其說雖若賢於混補之云然果行此則士之求入乎州學者必衆而今州郡之學錢粮有限將廣其額則食不足將仍其舊則其勢之偏選之艱而塗之狹又將有甚於前日之解額少而無所容也正使有以處之然使游其閒者校計得失於旦暮錙銖之間不得寧息是又不唯無益而損莫大焉亦非計之得也蓋嘗思之必欲乗時改制以漸復先王之舊而善今日之俗則必如明道先生熈寧之議然後可以大正其本而盡革其末流之弊如曰未暇則莫若且均諸州之解額以定其志立德行之科以厚其本罷去詞賦而分諸經子史時務之年以齊其業又使治經者必守家法命題者必依章句答義者必通貫經文條舉衆說而斷以己意學校則遴選實有道德之人使專敎導以來實學之士裁減解額舍選謬濫之恩以塞利誘之塗至於制科詞科武舉之屬亦皆究其利病而頗更其制則士有定志而無奔競之風有實行而無空言之弊有實學而無不可用之材矣此其大略也其詳則繼此而遂陳之夫所以必均諸州之解額者今之士子不安於鄉舉而爭趍太學試者以其本州解額窄而試者多太學解額闊而試者少本州只有解試一路太學則兼有舍選之捷徑又可以智巧而經營也所以今日倡爲混補之說者多是溫福處婺之人而它州不與焉非此數州之人獨多躁競而它州之人無不廉退也乃其勢驅之有不得不然者耳然則今日欲救其弊而不以大均解額爲先務雖有良法豈能有所補哉故莫若先令禮部取見逐州三舉終場人數大學終場人數解試亦合分還諸州理爲人數通比舊額都數定以若干分爲率而取其若干以爲新額如以十分爲率而取其一則萬人終場者以百人爲額更酙酌之又損太學解額舍選取人分數使與諸州不至大段殊絕其見住學人分數權許仍舊則士安其土而無奔趨流浪之意矣所以必立德行之科者德行之於人大矣然其實則皆人性所固有人道所當爲以其得之於心故謂之德以其行之於身故謂之行非固有所作爲增益而欲爲觀聽之美也士誠知用力於此則不唯可以脩身而推之可以治人又可以及夫天下國家故古之敎者莫不以是爲先若舜之命司徒以敷五敎命典樂敎胄子皆此意也至於成周而法始大備故其人材之盛風俗之美後世莫能及之漢室之初尚有遺法其選舉之目必以敬長上順鄕里肅政敎出入不悖所聞爲稱首魏晉以來雖不及古然其九品中正之法猶爲近之及至隋唐遂專以文詞取士而尚德之舉不復見矣積至于今流弊巳極其勢不可以不變而欲變之又不可不以其漸故今莫若且以逐州新定解額之半而又折其半以爲德行之科如解額百人則以二十五人爲德行科蓋法行之初恐考察未精故且取其半而又減其半其餘五十人自依常法明立所舉德行之目如八行之類專委逐縣令佐從實搜訪於省試後保明津遣赴州守倅審實保明申部於當年六月以前以禮津遣限本年内到部撥入太學於近上齋舍定排而優其廩給仍兔課試長貳以時延請詢考至次年終以次差充大小職事又次年終擇其尤異者特薦補官餘令特赴明年省試比之餘人倍其取人分數如餘人二十取一則此科十而取一蓋解額中巳減其半矣殿試各升一甲其不中人且令住學以俟後舉其行義有虧學術無取舉者亦當議罰則士知實行之可貴而不專事於空言矣所以必罷詩賦者空言本非所以敎人不足以得士而詩賦又空言之尤者其無益於設敎取士章章明矣然熈寧罷之而議者不以爲是者非罷詩賦之不善乃專主王氏經義之不善也故元祐初議有改革而司馬温公吕申公皆不欲復其欲復之者唯劉摯爲最力然不過以考校之難而爲言耳是其識之卑而說之陋豈足與議先王敎學官人之本意哉今當直罷無可疑者如以習之者衆未欲遽罷則限以三舉而遞損其取人之數俟其爲之者少而後罷之則亦不駭於俗而其弊可革矣所以必分諸經子史時務之年者古者大學之敎以格物致知爲先而其考校之法又以九年知類通達強立不反爲大成蓋天下之事皆學者所當知而其理之載於經者則各有所主而不能通也況今樂經亡而禮經缺二戴之記巳非正經而又廢其一焉蓋經之所以爲敎者巳不能備而治之者類皆舍其所難而就其所易僅窺其一而不及其餘則於天下之事宜有不能盡通其理者矣若諸子之學同出於聖人各有所長而不能無所短其長者固不可以不學而其所短亦不可以不辨也至於諸史則該古今興亡治亂得失之變時務之大者如禮樂制度天文地理兵謀刑法之屬亦皆當世所須而不可闕皆不可以不之習然欲其一旦而盡通則其勢將有所不能而卒至於不行若合所當讀之書而分之以年使天下之士各以三年而共通其三四之一則亦若無甚難者故今欲以易詩書爲一科而子年午年試之周禮儀禮及二戴之禮爲一科而卯年試之春秋及三傳爲一科而酉年試之年分皆以省試爲界義各二道諸經皆兼大學論語孟子中庸義各一道論則分諸子爲四科而分年以附焉諸子則如荀揚王韓老莊之屬及本朝諸家文字當别討論分定年數兼許於當年中傳中出論二道策則諸史時務亦然諸史則左傳國語史記兩漢爲一科三國晉書南北史爲一科新舊唐書五代史爲一科通鑑爲一科時務則律曆地理爲一科通禮新儀爲一科以次分年如經子之法策各二道則士無不通之經無不習之史而皆可爲當世之用矣其治經必專家法者天下之理固不外於人之一心然聖賢之言則有淵奥爾雅而不可以臆斷者其制度名物行事本末又非今日之見聞所能及也故治經者必因先儒巳成之說而推之借曰未必盡是亦當究其所以得失之故而後可以反求諸心而正其繆此漢之諸儒所以專門名家各守師說而不敢輕有變焉者也但其守之太拘而不能精思明辨以求眞是則爲病耳然以此之故當時風俗終是淳厚近年以來習俗苟偷學無宗主治經者不復讀其經之本文與夫先儒之傳注但取近時科舉中選之文諷誦摹倣擇取經中可爲題目之句以意扭揑妄作主張明知不是經意但取便於行文不暇恤也蓋諸經皆然而春秋爲尤甚主司不惟不知其繆乃反以爲工而置之高等習以成風轉相祖述慢侮聖言日以益甚名爲治經而實爲經學之賊號爲作文而實爲文字之妖不可坐視而不之正也今欲正之莫若討論諸經之說各立家法而皆以注疏爲主如易則兼取胡瑗石介歐陽脩王安石邵雍程頥張載吕大臨楊時書則兼取劉敞王安石蘇軾程頥楊時晁說之葉夢得呉棫薛秀宣吕祖謙詩則兼取歐陽脩蘇軾程頥張載王安石吕大臨楊時吕祖謙周禮則劉敞王安石楊時儀禮則劉敞二戴禮記則劉敞程頥張載吕大臨春秋則啖助趙正陸淳孫明復劉敞程頥胡安國大學論語中庸孟子則又皆有集解等書而蘇軾王雱吳胡寅等說亦可采以上諸家更加考訂增損如劉彝等說恐亦可取令應舉人各占兩家以上於家狀内及經義卷子第一行内一般聲說將來答義則以本說爲主而旁通他說以辨其是非則治經者不敢妄牽已意而必有据依矣其命題所以必依章句者今日治經者旣無家法其穿鑿之弊巳不可勝言矣而主司命題又多爲新奇以求出於舉子之所不意於所當斷而反連之於所當連而反斷之大抵務欲無理可解無理可通以觀其倉卒之閒趨附離合之巧其始蓋出於省試上天之載無聲無臭儀刑文王之一題然而當時傳聞猶以爲怪及今數年則無題不然而人亦不之怪矣主司旣以此倡之舉子亦以此和之平居講習專務裁剪經文巧爲鬬飣以求合乎主司之意其爲經學賊中之賊文字妖中之妖又不止於家法之不立而已也今旣各立家法則此弊勢當自革然恐主司習熟見聞尚仍故態却使舉子愈有拘礙不容下筆願下諸路漕司戒勑所差考試官今後出題須依章句不得妄有附益裁剪如有故違許應舉人依經直答以駁其繆仍經本州及漕司陳訴將命題人重作行遣其諸州申到題目亦令禮部國子監長貳看詳紏舉譴罰則主司不敢妄出怪題而諸生得守家法無復敢肆妖言矣又按前賢文集策問皆指事設疑據實而問多不過百十字嘉祐治平以前尚存舊體而吕申公家傳記熈寜事乃云有司發策問必先稱煩時政對者因大爲諛詞以應之然則此風蓋未遠也今亦宜爲之禁使但條陳所問之疑略如韓歐諸集之爲者則亦可以觀士子之實學而息其諛侫之姦心矣其必使答義者通貫經文條陳衆說而斷以已意者其說巳略具于家法之條矣蓋今日經學之難不在於治經而難於作義大抵不問題之小大長短而必欲分爲兩段仍作兩句對偶破題又須借用他語以暗貼題中之字必極於工巧而後巳其後多者三二千言别無他意不過止是反復敷衍破題兩句之說而已如此不唯不成經學亦復不成文字而使學者卒歲窮年枉費日力以從事於其間甚可惜也欲革其弊當更寫卷之式明著問目之文而疏其上下文通約三十字巳上次列所治之說而論其意文次旁列他說而以已意反復辨析以求至當之歸但令直見聖賢本意與其施用之實不必如今日經義分段破題對偶敷衍之體每道止限五六百字以上則雖多增所治之經而答義不至枉費辭說日力亦有餘矣至於舊例經義禁引史傳乃王氏末流之弊而論子史者不復訂以經指又俗學卑近之失皆當有以正之使治經術者通古今議論者識原本則庶乎其學之至矣其學校必選實有道德之人使爲學者師以來實學之士裁減解額舎選謬濫之恩必塞利誘之塗者古之大學主於敎人而因以取士故士之來者爲義而不爲利且以本朝之事言之如李􅞧所記元祐侍講吕希哲之言曰仁宗之時太學之法寛簡國子先生必求天下賢士眞可爲人師者就其中又擇其尤賢者如胡翼之之徒使專敎導規矩之事故當是時天下之士不遠萬里來就師之其游太學者端爲道藝稱弟子者中心說而誠服之蓋猶有古法之遺意也熙寧以來此法浸壞所謂太學者但爲聲利之場而掌其敎事者不過取其善爲科舉之文而嘗得儁於場屋者耳士之有志於義理者旣無所求於學其奔趨輻湊而來者不過爲解額之濫舍選之私而巳師生相視漠然如行路之人閒相與言亦未嘗開之以德行道藝之實而月書季考者文秪以促其嗜利苟得冒昧無耻之心殊非國家之所以立學敎人之本意也欲革其弊莫若一遵仁皇之制擇士之有道德可爲人師者以爲學官而乆其任使之講明道義以敎訓其學者而又痛減解額之濫以還諸州罷去舍選之法而使爲之師者考察諸州所解德行之士與諸生之賢者而特命以官則太學之敎不爲虚設而彼懐利于進之流自無所爲而至矣如此則待補之法固可罷去而混補者又必使與諸州科舉同日引試則彼有鄉舉之可望者自不復來而不患其紛冗矣至於取人之數則又嚴爲之額而許其補中之人從上幾分特赴省試則其舍鄉舉而來赴補者亦不爲甚失職矣其計會監試漕試附試之類亦當痛減分數嚴立告賞以絶其冒濫其諸州敎官亦以德行人充而責以敎導之實則州縣之學亦稍知義理之敎而不但爲科舉之學矣至於制舉名爲賢良方正而其實但得記誦文詞之士其所投進詞業亦皆無用之空言而程試論策則又僅同覆射兒戲初無益於治道但爲仕宦之捷徑而巳詞科則又習於謟諛夸大之詞而競於駢儷刻雕之巧尤非所以爲敎至於武舉則其弊又不異於儒學之陋也欲革其弊則制科當詔舉者不取其記誦文辭而取其行義器識罷去詞業六論而直使待對於廷訪以時務之要而不窮以隱僻難知之事詞科則當稍更其文字之體使以深厚簡嚴爲主而以能辨析利害敷陳法度爲工武舉則亦使學官放經義論策之制參酌定議頒下武經總要等書而更加討論補其遺逸使之誦習而立其科焉則庶乎小大之材各得有所成就而不爲俗學之所病矣夫如是是以敎明於上俗美於下先王之道得以復明於世而其遺風餘韻又將有以及於方來與夫規規然固守末流之弊法而但欲小變一二於其閒者利害相絶固有閒矣草茅之慮偶及於此故敢私記其說以爲當路之君子其或將有取焉朱子調息箴鼻端有白我其觀之隨時隨處容與猗移靜極而嘘如春沼魚動巳而吸如百蟲蟄氤氲開闔其妙無窮孰其尸之不宰之功雲卧天行非予敢議守一處和千二百歲按雙峯語錄云門人問涵養之道須用敬否曰固是如此但功夫熟時亦不用說敬只是纔靜便存而今初學却須把敬來作一件事常常持守乆之而熟則忘其爲敬矣問明道敎人且靜坐是如何曰此亦爲初學而言蓋他從紛優中來此心不定如野馬然如何便做得功夫故教它靜坐待此心寧後却做功夫然亦非敎它終只靜坐也故下且字先生因言調息箴亦不可無如釋氏之念佛號道家之數息皆是要收此心使之專一在此若此心不存則數珠之數數息之數皆差了調息亦然人心不定者其鼻息之嘘氣常長吸氣常短故須有以調之息數亭勻則心亦漸定調息又勝數息明甫見勉齋說性者萬物之一原明甫曰在廬山時饒師魯曾如此說來勉齋曰是它這事物靜了看得如此須是靜方看得道理出廬山諸人如蔡元思胡伯量輩皆不肯於此著功見某有時靜坐諸公皆見攻以爲學禅雖宏齋亦不能不以爲慮也看道理須是涵養若此心不得其正如何看得出調息箴亦不可無蓋心固氣之帥然亦當持其志無㬥其氣也饒雙峯語錄云下學上達意在言表程子此語蓋爲讀書者言讀書是下學之一事蓋凡下學者皆可以上達但恐下學得不是則不能上達耳且如讀書則聖人所以作經之意是上靣一層事其言語則只是下靣一層事所以謂之意在言表若讀書而能求其意則由辭以通理而可上達若但溺心於章句訓沽之閒不能玩其意之所以然則是徒事於言語文辭而巳决不能通其理也程子曰玩其辭不得其意者有矣又曰前儒失意以傳言後學誦言而忘味此皆下學得不是而無由上達者也問夫子所謂下學兼知行否曰夫子此章只說知惟程子引此以釋忠恕違道不遠曰斯下學上達之義却是兼知行說問或問云上達而與天爲一是知行俱到能如此否曰與天爲一亦以知言方其未上達時與天隔幾重在及其旣巳上達則吾心卽天天卽吾心但聖人之上達與學者之上達有遲速之不同聖人才學便達學者則今日格一物明日格一物乆後方貫通集慶路江東書院講義端禮竊聞之朱子曰爲學之道莫先於窮理窮理之要必在於讀書讀書之法莫貴乎循序而致精而致精之本則又在於居敬而持志此不易之理也其門人與私淑之徒㑹稡朱子平日之訓而節取其要定爲讀書法六條曰循序漸進曰熟讀精思曰虚心涵泳曰切巳體察曰著緊用力曰居敬持志且所謂循序漸進者朱子曰以二書言之則通一書而後及一書以一書言之篇章文句首尾次第亦各有序而不可亂也量力所至而謹守之字求其訓句索其旨未得乎前則不敢求乎後未通乎此則不敢志乎彼如是則志定理明而無踈易陵躐之患矣若奔程趂限一向䟎看了則看猶不看也近方覺此病痛不是小事元來道學不明不是上靣欠工夫乃是下靣無根脚其循序漸進之說如此所謂熟讀精思者朱子曰荀子說誦數以貫之見得古人誦書亦記遍數乃知橫渠敎人讀書必須成誦眞道學第一義遍數已足而未成誦必欲成誦遍數未足雖巳成誦必滿遍數但百遍時自是強五十遍時二百遍時自是彊一百遍時今所以記不得說不去心下若存若亡皆是不精不熟之患今人所以不如古人處只爭這些子學者觀書讀得正文記得注解成誦精熟註中訓釋文意事物名件發明相穿紐處一一認得如自巳做出來底一般方能玩味反覆向上有通透處若不如此只是虚設議論非爲巳之學也其熟讀精思之說如此所謂虚心涵泳者朱子曰莊子說吾與之虚而委蛇旣虚了又要隨他曲折去讀書須是虚心方得聖賢說一字是一字自家只平著心去秤停他都使不得一毫杜撰學者看文字不必自立說只記前賢與諸家說便了今人讀書多是心下先有箇意思了却將聖賢言語來揍他底意思其有不合便穿鑿之使合其虚心涵泳之說如此所謂切已體察者朱子曰入道之門是將自箇巳身入那道理中去漸漸相親與巳爲一而今人道在這裏自家在外元不相干學者讀書須要將聖賢言語體之於身如克己復禮如出門如見大賔等事須就自家身上體覆我實能克己復禮主敬行恕否件件如此方有益其切巳體察之說如此所謂著緊用力者朱子曰寛著期限緊著課程爲學要剛毅果決悠悠不濟事且如發憤忘食樂以忘憂是甚麽精神甚麽骨肋今之學者全不曾發憤直要抖擻精神如救火治病然如撑上水船一篙不可放緩其著緊用力之說如此所謂居敬持志者朱子曰程先生云涵養須用敬進學則在致知此最精要方無事時敬以自持凡心不可放入無何有之鄉須是收歛在此及應事時敬於應事讀書時敬於讀書便自然該貫動靜心無不在今學者說書多是捻合來說却不詳密活熟此病不是說書上病乃是心上病蓋心不專靜純一故思慮不精明須要養得虚明專靜使道理從裏面流出方好其居敬持志之說如此愚按此六條者乃朱子敎人讀書之要故其誨學者告君上舉不出此而自謂其爲平日艱難巳試之效者也竊嘗論之自孔子有博學於文約之以禮亦可以弗畔矣夫之訓以顔子之善學其賛孔子循循善誘亦不過曰博我以文約我以禮而已是孔子之敎顔子之學不越乎博文約禮二事豈非以學者捨是無以爲用力之地歟蓋盈天地間萬物萬事莫非文也其文出於聖人之手而存之於書者載道爲尤顯故觀孔子責子路何必讀書然後爲學之語可爲深戒豈非讀書爲博文之大而急者歟朱子曰約禮則只是這些子博文各有次序當以大而急者爲先蓋謂是也然則博文豈可不以讀書爲先而讀書又豈可不守朱子之法朱子平日敎人千言萬語總而言之不越乎此六條而六條者總而言之又不越乎熟讀精思切巳體察之兩條蓋熟讀精思即博文之功而切已體察即約禮之事然則欲學顔子之學者豈可不由是而求之哉今幸其說具存學者讀書能循是六者以實用其力則何道之不可進何聖賢之不可爲使朱子復生身登其門耳聞其誨未必若是之詳且要也學者可不自知其幸歟世之讀書其怠忽間斷者固不足論其終日勤勞貪多務廣終身無得者蓋以讀之不知法故也惟精廬初建端禮荒陋匪材夫豈其任承乏之初敢以朱子讀書法首與同志講之期相與確守焉以求共學之益使他日義精仁熟賢材輩出則朱子之訓不爲虚語精廬不爲虚顧不美歟存存齋銘性與天道夫子罕言程端禮於易乃言成性存存惟性之成心統性情天予其全知禮畢具無異愚賢性體惟静心乗氣機存之斯正曰惟存心其效伊何所以存性動靜皆定其方伊何無閒無雜在乎主敬始曰存存虚間靜一勉彊安行細㣲紏紛聖賢是分弗謹弗養千里其奔效天法地道義之門右讀書分年日程余守此與友朋共讀歳歳刪修遂與崇徳呉氏義塾台州路學平江甫里書院陸氏池州建徳縣學友朋馮彦思所刋及集慶江東書院友朋安西高郵六合江浙友朋所鈔及定安劉謙父所刋舊本不同此則最後刋于家塾本也覽者儻矜其愚𥙷其所未及實深望焉元統三年十一月朔程端禮書于甬東之思勉齋程氏家塾讀書分年日程卷三旁證畢
