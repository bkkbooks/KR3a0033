front:
  text: 程氏家塾讀書分年日程卷三旁證正始之音序夫載道傳世書之功大矣書有六義其來巳久蓋自蒼頡始制文字雖點畫偏傍之微有精義入神之妙有自然布置之宜後人推之以爲有象形指事㑹意諧聲轉注假借六者之别雖分千衍萬要不越此夫象形者寫其跡也指事者推其義也會意者合其形而兼乎義者也諧聲者合其聲以附乎形也轉注者形之變也假措者聲之變也學者精辨乎此則古今文字若網之在綱有條而不紊矣是以古之小學之敎自十歲則敎之書計而大司徒之屬有保氏者所以誘掖夫未成之材而敎之道藝者六書居其一焉蓋將使之自末以窮本由藝以達道因小學之流泝乎大學之源小而習之终其身而不厭古人於六書之義其重若此蒼頡而下至周宣王時有史籕者演暢古文箸爲大篆漢志謂爲周人敎學童之書雖時與古文少異而六義初未失也自秦斯輩省改古籕約爲小篆而古文浸微獄吏程邈欲趨約易變爲隷體而籕篆亦廢又有草書者日趨簡便而六義亦幾乎絶漢人猶稍知尊崇字學尉律試吏者課以八體而必使諷籕至九千字以上吏民上書或劾其不正者然而古法既變雜體紛然非復蒼史之舊其後楊雄之訓纂相如之凡将史游之急就以致甄豐之改定古文是雖有意於存古要皆略而不備及後漢和安時許愼受學賈逵廼始兼采史籕雄斯作說文解字萬六百有餘上之其書詳博最爲近古然􅊢學行之既乆行草八分雜然並岀視史籕反爲奇怪鍾王而䧏眞草爭妍顧野王廣益說文爲玉篇始從其楷孫愐増加陸法言切韻更爲唐韻說文雖存而學之者鮮矣逮大曆中李陽冰始尚說文修正筆法自謂篆籕中興然時持臆說排斥許氏識者謂其筆力雖殊絶而古體益壊歷考古今紛紛異尚固無以加於說文也然叔重止得象形諧聲二義而其餘復略且病於子母之混淆國𥘉詔徐鉉校定說文雖曰不遺六書之體然大略亦得二義而已但說文無翻切鉉始取孫愐音切附益之大中祥符有詔刋正玉篇廣韻而銳文復衰又有丁度集韻司馬類篇之屬其名不一或訓或釋或證或辨至王安石字說作而又一以㑹意解之固未有全六義者也玉篇類形不類聲廣韻類聲不類形大抵形尚可考而聲爲難工蓋形有定而聲無窮也類形者少類聲者多類聲雖多而未有正其始音之的者世革風移轉相假借方音淸濁譌變因乘甚矣始音之難知也栢知學最晚小學工夫固大缺畧諸經雖多釋音每病始音之未明旣而求於說文文病從聲之難曉一日以說文翻爲楷字又得李文簡燾類韻之編部叙雖非叔重之舊然亦頗便於討閱旣而又得夾漈鄭公樵所箸六書畧一篇喜不釋手蓋其訂覈精整六義粲然一埽千古之陋而於假借一門始音之義亦備故獨取以附于說文翻楷之後又得賈昌朝羣經音辨取其三麗之詳說徐音賈辨鄭畧微有異同互相補發按古證今訂譌正誤以之讀聖賢之書於音義亦庶幾焉今合而一之名曰正始之音嗚呼昔沈約以郊居賦示王筠讀至雌霓五的反撫掌笑曰僕常恐人呼爲五雞反遂以爲知音以霓字從雨從兒義合諧聲固當讀爲五雞反烏在其爲知音哉韓昌黎鄙爾雅謂非磊落人爾雅固未爲盡善是亦學之一端而遽鄙之過矣而况後世自兒已習爲進取捷徑之學固視此爲迂也迂非栢所敢避但自念日月斯邁於六藝始求其一而未究其蘊方自笑其苟焉耳因倂識其編鈔之歲月云端平丙申秋仲晦王栢書字音淸濁辨賈昌朝譔
