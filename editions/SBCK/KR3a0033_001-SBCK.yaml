front:
  text: 右稼軒書院山長程君本朱真二先生教法详為工程以教今之應舉者用意迂而得效甚捷學者􅀎信守不􅈈則其進也敦潔夫下學上達之功則有不外是者使學者病其迂則亦不􅁕以言学矣凡學道者不合乎今然後􅀎合乎古惟程君勿以人言自畫則又余之望也至治改元良月廿又八日巴西鄧文原因巡􅊗建平觀此輙書其後是亦勉㝎安劉侯謙父見郷友鉛山教授程君敬􅅩讀書分年日程書大善之俾余為之序既􅂢貲刋版以之歸敎北方之學者矣今敬􅅩重為删㝎其門人與郷友又􅂢貲刋于甬東之家塾余谓此書之為法盖以當讀之書㝎其本末重輊先後之序详其莭目分之以年程之以日俾其心力淂以主一而整暇先讀一書精熟胷中阮有真知自淂之實然後以此一書之􅀁淂者為本而􅄪讀一書讀四書诸􅀴皆然然後以其淂扵􅀴者為本而看史然後以其淂扵􅀴史者為本而為文盖截然不可少有􅀁紊且兼也其始之讀也惟務眀經􅁱行以立儒者之大本若不知丗之有作文應舉事者及其應舉也則又初不外此以為業其為文也又皆沛乎其􅀡寫胷中之真見而不假牽合傅㑹無用之虗辭又可因其有言而責其有徳有業故科舉之行􅂉不行學者之應舉􅂉不應舉皆不可以無此書也使朱子復生思救士習之弊不􅀎易此矣凡為師弟子者知守是以敎以學有司之職在興學者知守是以為勸勉程􅇂之方庶乎學校有造士之實而真儒之效白于天下矣豈特為科目増重而已㢤其􅂉惮焉而不􅀎守者皆見小欲速者也務外為人者也此儒之小人由是以分是又不􅁕以言學不􅁕以為士矣敬􅅩職教江左學校者四十年􅀁至以此為教而躬其勞以求實益凡其􅀁教與門人之守焉以為教者成效卓然􅀁在刋以為式且未甞以職之卑為淹而惟以盡職之難是􅁨其亦異扵丗之爲學官者矣元統三年十一月朔前武林郡文學甬東薛觀䖏静父識
