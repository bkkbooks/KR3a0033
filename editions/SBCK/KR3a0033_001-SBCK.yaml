body:
  text: 北平􅃏程氏家塾讀書分年日程綱領此宜揭之書齋鄞程端禮編白鹿洞書院敎條父子有親君臣有義夫婦有别長㓜有序朋友有信右五敎之目堯舜使契爲司徒敬敷五敎卽此是也學者學此而巳而其所以學之之序亦有五焉其别如左博學之審問之愼思之明辨之篤行之右爲學之序學問思辨四者皆所以窮理􅀂夫篤行之事則自脩身以至處事接物亦各有要其别如左言忠信行篤敬懲忿窒慾遷善改過右脩身之要正其誼不謀其利明其道不計其功右處事之要已所不欲勿施於人行有不得反求諸已右接物之要熹􅀼觀古昔聖賢所以敎人爲學之意莫非使之講明義理以脩其身然後推以及人非徒欲其務記覽爲詞章以釣聲名取利禄而巳今之爲學者則旣反是矣然聖賢所以敎人之法具存於經有志之士固當熟讀􅀷思而問辨之苟知其理之當然而責其身以必然則夫規矩禁防之具豈待他人設之而後有所持循哉近丗於學有規其待學者爲巳淺矣而其爲法又未必古人之意也故今不復施於此堂而特取凡聖賢所以敎人爲學之大端條列如右而揭之楣間諸君其相與講明遵守而責之於身焉則夫思慮云爲之際其所以戒謹恐懼者必有嚴於彼者矣其有不然而或出於禁防之外言之所棄則彼所謂規者必將取之固不得而略也諸君其念之哉程董二先生學則凡學於此者必嚴朔望之儀其日昧爽直日一人主擊板始繫咸起􅏕漱總櫛衣冠􅂯擊皆著深衣或凉衫升堂師長帥弟子詣先聖像前􅂯拜焚香訖文􅂯拜退師長西南嚮立諸生之長者率以次東北嚮􅂯拜師長立而扶之長者一人前致辭訖又􅂯拜師長入于室諸生以次環立􅂯拜退各就案謹晨昏之令常日擊板如前􅂯繫諸生升堂序立俟師長出户立定皆揖次分兩序相揖而退至夜將寢繫板㑹揖如朝禮㑹講㑹食㑹茶亦擊板如前朝揖㑹講以深衣或凉衫餘以道服禙子居處必恭居有常處序坐以齒凡坐必直身正體毋箕踞傾􅀝交脛揺足寢必後長者既寢勿言當晝勿寢歩立必正行必徐立必拱必後長者毋背所尊毋踐閾毋跛􅀝視聽必端毋淫視毋傾聽言語必謹致詳審重然諾肅聲氣毋輕毋誕毋戲謔諠譁毋及郷里人物長短及市井鄙俚無益之談容貌必莊必端嚴凝重勿䡖易放肆勿麄豪狼傲勿䡖有喜怒衣冠必整勿爲詭異華靡毋致垢弊簡率雖燕處不得衩􅃝露頂雖盛暑不得􅂺去鞋韈飲食必節毋求飽毋貪味食必以時毋耻惡食非節假及尊命不得飲飲不過三爵勿至醉出入必省非尊長呼喚師長使令及已有急幹不得􅂺出學門出必告反必面出不易方入不踰期讀書必專一必正心肅容計遍數遍數巳足而未成誦必須成誦遍數未足雖巳成誦必滿遍數一書巳熟方讀一書毋務泛觀毋務彊記非聖賢之書勿讀無益之文勿觀冩字必楷敬勿草勿欹傾几案必整齊位置有倫􅂤帙不亂書笥衣篋必謹扃鑰堂室必潔淨逐日􅀡日再擊板如前以水洒堂上良乆以帚掃去塵埃以巾抆拭几案其餘悉令齋僕掃拭之别有穢汚悉令掃除不拘早晚相呼必以齒年長倍者以丈十年長者以兄年相􅀂者以字勿以爾汝書問稱謂亦如之接見必有定凡客請見師坐定􅀡日擊板諸生如其服升堂序揖立侍師長命之退則退􅀂客於諸生中有自欲相見者則見師長畢就其位見之非其􅀋者勿與親狎修業有餘功游藝有適性彈琴習射􅄬壷各有儀矩非時勿弄博奕鄙事不宜親學使人莊以恕而必專所聽擇謹愿勤力者莊以臨之恕以待之有小過者訶之甚則白於師長懲之不悛衆稟師長遣之不許􅀡行已意苟日從事於斯而不敢忽則入德之方庶乎其近矣道不遠人理不外事故古之敎者自其能食能言而所以訓導之整齊之者莫不有法而況家塾黨庠術序之閒乎彼學者所以入孝出弟謹信羣居終日德進業修而㬥慢放肆之氣不設於身體者繇此故也番昜程端蒙與其友生董銖共爲此書將以敎其鄕人子弟而作新之蓋有古人小學之遺意矣余以爲凡爲庠序之師者能以是而率其徒則所謂成人有德小子有造者將復見於今日矣於以助於后王降德之意豈不美哉淳熈丁未十一月甲子新安朱熹書白鹿洞敎條乃文公朱先生所集聖賢之成訓而學則者鄕先生程董二公之所爲文公嘗有取焉者也今合二者而並揭之一則舉其學問之宏綱大目而使人之知所用力一則定爲羣居日用之常儀而使人有所持循卽大小學之遺法也學者誠能從事於此則本末相須內外交養而入道之方備矣􅀂夫近丗之所謂規者則文公不以施之鹿洞而謂必不得巳而後取之故今亦不敢以此列於此云寶祐戊午元日饒魯謹書西山眞先生敎子齋規一曰學禮凡爲人要識道理識禮數在家庭事父母入書院事先生並要恭敬順從遵依敎誨與之言則應敎之事則行毋得怠慢自任巳意二曰學坐定身端坐齊腳歛手毋得伏􆁤靠背偃仰傾側三曰學行籠袖徐行毋得掉臂跳足四曰學立拱手正身毋得跛倚欹斜五曰學言樸實語事毋得妄誕低細出聲母得呌喚六曰學揖低頭屈腰出聲收手毋得輕率慢易七曰學誦專心看字斷句慢讀須要字字分明毋得目視東西手弄他物八曰學書臻志把筆字要齊整圓淨毋得輕易糊塗朱子讀書法居敬持志循序漸進熟讀精思虚心涵泳切已體察箸緊用力右詳見輔漢􅀸所編近巳刋集慶學歛身正坐緩視微吟虛心涵泳切已體察右見朱子讀書法寛箸期限緊箸課程右見朱子讀書法未熟快讀足遍數巳熟緩讀思理趣右古人讀書法朱子記經史閣有曰古之學者無他明德新民求各止於至善而已夫其所明之德所止之善豈有待於外求哉識其在我而敬以存之其亦可矣其所以必曰讀書云者則以天地隂陽事物之理脩身事親齊家及國以至於平治天下之道與凡聖賢之言行古今之得失禮樂之名數而至於食貨源流兵刑法制亦莫非吾度內有不可得而精粗者􅀂非攷諸載籍之文沉潛參伍以求其故則亦無以明夫明德體用之全而止其至善精微之極然自聖學不傳世之爲士者不知學之有本而惟書之讀則其所以求於書不越乎記誦訓詁文詞之閒以釣名干禄而巳是以天下之書愈多而理愈䏞學者之事愈勤而心愈放詞章愈麗議論愈高而其德業事功之實愈無以逮乎古人然非書之罪也讀者不知學之有本而無以爲之地也使二三子者知夫爲學之本有無待於外求者而因以致其操存持守之力使吾方寸之間清明純粹眞有以爲讀書之地而後宏其規密其度循其先後本末之序以大玩乎閣中之藏則夫天下之理必有以盡其纎悉而一以貫之異時所以措諸事者亦將有本而無窮矣朱子記稽古閣有曰人之有是身也則必有是心有是心也則必有是理􅀂仁義禮智之爲體惻隱羞惡恭敬是非之爲用則人皆有之非由外鑠我也然聖人之所以敎不使學者收視反聽一以反求諸心爲事而必曰興於詩立於禮成於樂又曰博學審問愼思明辨而篤行之何哉蓋理雖在我而或蔽於氣稟物欲之私則不能以自見學雖在外然皆所以講乎此理之實及其浹洽貫通而自得之則又初無內外精粗之閒也世變俗衰士不知學挾冊讀書者旣不過於誇多鬬靡以爲利禄之計其有意於爲已者又􅀡以爲可以取足於心而無俟於他求也是以墮於佛老空虛之邪見而於義理之正法度之詳有不察焉其幸而或知理之在我與夫學之不可以不講者則又不知循序致詳虚心一意從容以㑹乎在我之本然是以急遽淺迫終不能浹洽而貫通也嗚呼是豈學之果不可爲書之果不可讀而古先聖賢所以垂世立敎果無益於後來也哉道之不明可嘆也巳朱子上䟽曰爲學之道莫先於窮理窮理之要必在於讀書讀書之法莫貴於循序而致精而致精之本則又在於居敬而持志此不昜之理也夫天下之事莫不有理爲君臣有君臣之理爲父子有父子之理爲兄弟爲夫婦爲朋友以至出入起居應事接物之際亦莫不各有其理焉窮之則自君臣之大以至事物之微莫不知其所以然與其所當然而亡纎芥之疑善則從之惡則去之而無毫髮之累此爲學所以莫先於窮理也至論天下之理則要妙精微各有攸當亘古亘今不可移易惟古之聖人爲能盡之而其所行所言無不可爲天下後世不易之大法其餘則順之者爲君子而吉背之者爲小人而凶吉之大者則能保四海而可以爲法凶之甚者則不能保其身而可以爲戒是其粲然之迹必然之効蓋莫不具於經訓史策之中欲窮天下之理而不卽是以求之則是正墻面而立耳此窮理所以必在於讀書也􅀂夫讀書則其不好之者固怠忽閒斷而無所成矣其好之者文不免乎貪多而務廣徃徃未啓其端而遽巳欲􅊥其終未究乎此而忽巳志在乎彼是以雖復終日勤勞不得休息而意緒匆匆常􅀂有所奔走迫逐而無從容涵泳之樂是又安能􅀷信自得常乆不厭以異於彼之怠忽閒斷而無所成者哉孔子所謂欲速則不達孟子所謂進銳退速正謂此也誠能監此而有以反之則心濳於一乆而不移而所讀之書文意接連血脉通貫自然漸漬浹洽心與埋會而善之爲勸者􅀷惡之爲戒者切矣此循序致精所以爲讀書之法也􅀂夫致精之本則在於心而心之爲物至虚至靈神妙不測常爲一身之主以提萬事之綱而不可有頃刻之不存者也一不自覺而馳騖飛揚以徇物慾於軀殻之外則一身無主萬事無綱雖其俯仰顧盼之閒蓋巳不自覺其身之所在而況能反覆聖言參考事物以求義理至當之歸乎孔子所謂君子不重則不威學則不固孟子所謂學問之道無他求其放心而巳矣者正謂此也誠能嚴恭寅畏常存此心使其終日儼然不爲物欲之所侵亂則以之讀書以之觀理將無徃而不通以之應事以之接物將無所處而不當矣此居敬持志所以爲讀書之本也皆愚臣平生爲學艱難辛苦巳試之效􅀼意聖賢復生所以敎人不過如此蓋雖帝王之學殆亦無以易之朱子答汪尚書書曰近世言道學者失於太高讀書講義率常以徑易超絶不歷階梯爲快而於其閒曲折精微正好玩索處例皆忽略厭棄以爲卑近瑣屑不足畱情以故雖或多聞博識之士其於天下之義理亦不能無所未盡曷􅀂循下學上達之序口講心思躬行力究寧煩毋略寧下毋高寧淺毋􅀷寧拙毋巧從容濳玩存乆漸明衆理洞然次第無隱然後知夫大中至正之極天理人事之全無不在是初無迥然超絶不可及者而幾微之閒毫氂畢察酬酢之際體用渾然雖或使之任至重而處所難亦沛然行其所無事而巳朱子答吕子約書曰夫學者旣學聖人則當以聖人之敎爲主今六經語孟中庸大學之書具在彼以了悟爲高者旣病其障礙而以爲不可讀此以記覽爲重者又病其狹小而以爲不足觀如是則是聖人之所以立言垂訓者徒足以誤人而不足以開人孔子不賢於堯舜而達磨賢於仲尼矣無乃悖之甚邪朱子答劉定夫書曰學者息却許多狂妄身心除却許多閒雜說話著實讀書初時儘且尋行數墨乆乆自有見處最怕人說學不在書不務佔畢不專口耳下梢說得張皇都無收拾只是一􅂣脫空􅀡是可惡朱子曰爲學須是已分上做工夫有本領方不作言語說􅀂無存養儘說得明自成兩片亦不濟事況未必說得明乎要須發憤忘食痛切去做身分上工夫莫荏苒歲月可惜也朱子曰某之講學所以異於科舉之文立是要切已行之􅀂只恁地說過依舊不濟事􅀂實是把做工夫只是敬以􅀡內義以方外八字一生用之不盡又曰某近覺得學者所以不成箇頭項者只縁聖賢說得多了旣欲爲此又欲爲彼如說敬以􅀡內義以方外􅀂實下工夫見得眞箇是敬立則內􅀡義形而外方這終身可以及用今人却似見得這兩句好又見說克巳復禮也好又見說出門如賔也好空多了少閒却不把捉得一項周全李貫之曰敬能集義義不離敬敬不容不義義不容不敬敬義夾持則心常存心存則心熟而智益明敬義二字該盡六經語孟中所言之理朱子論孟集義序曰論孟之書學者所以求道之至要古今爲之說者蓋巳百有餘家然自秦漢以來儒者􅀋皆不足以與聞斯道之傳其溺於卑近者旣得其言而不得其意其騖於高遠者則又支離踳駮或乃幷其言而失之學者益以病焉宋興百年河洛之閒有二程先生者出然後斯道之傳有繼其於孔子孟氏之心蓋異丗而同符也故其所以發明二書之說言雖近而索之無窮指雖遠而操之有要使夫讀者非徒可以得其言而又可以得其意非徒可以得其意而又可以幷其所以進於此者而得之其所以興起斯文開悟後學可謂至矣閒嘗蒐輯條流以附於本章之次旣又取夫學之有同於先生者與其有得於先生者􅀂橫渠張公􅀂范氏名祖禹字淳夫二吕氏希哲字原明大臨字與叔謝氏良佐字􅂋道游氏酢字定夫楊氏時字中立侯氏仲良字師聖尹氏焞字彥明凡九家之說以附益之名曰論孟精義以備觀省而同志之士有欲從事於此者亦不隱焉抑嘗論之論語之書無所不包而其所以示人者莫非操存涵養之要七篇之指無所不䆒而其所以示人者􅀋皆體驗充擴之端夫聖賢之分其不同固如此然而體用一源也顯微無閒也是則非夫先生之學之至其孰能知之嗚呼兹其所以奮乎百世絶學之後而獨得夫千載不傳之傳也歟􅀂張公之於先生如横渠之於二程論其所至􅀼意其猶伯夷伊尹之於孔子而一時及門之士考其言行則又未知其孰可以爲孔氏之顏曾今録其言非敢以爲無少異於先生而悉合乎聖賢之意亦曰大者旣同則其淺􅀷踈密毫氂之閒正學者所宜盡心耳至於近歳以來學於先生之門人者又或出其書焉則意其源遠末分醇醨異味而不敢載矣或曰凡說之行於世而不列於此者皆無取巳乎曰不然也漢魏諸儒正音讀通訓詁考制度辨名物其功博矣學者苟不先渉其流則亦何以用力於此而近世一二名家與夫所謂學於先生之門人者其攷證推說亦或時有補於文義之閒學者有得於此而後觀焉則亦何適而無得哉特所以求夫聖賢之意者則在此而不在彼爾􅀂夫外自託於程氏而竊其近似之言以文其異端之說者則誠不可以入於學者之心然以其荒幻浮誇足以欺世也而流俗頗巳歸鄕之矣其爲害豈淺淺哉顧其語言氣􅁚之閒則實有不難辨者學者誠用力於此書而有得焉則於其言雖欲讀之亦且有所不暇矣然則是書之作其率爾之誚雖不敢辭至於明聖傳之統采衆說之長折流俗之謬則竊亦妄意其庶幾焉朱子作論語訓蒙後更名集注序曰余旣序次論語精義以備觀覽暇日又爲兒輩論之大抵諸老先生之爲說非本爲童子設也故其訓詁略而義理詳初學者讀之經之文句未能自通又當徧求誦說問其指意茫然迷眩殆非啓蒙之要因爲刪錄以成此書本之註疏以通其訓詁參之釋文以正其音讀然後會之於諸先生之說以發其精微一句之義繫之本句之下一章之旨列之本章之左以平生所聞於師友而得於心思者閒附一二條焉本末精粗大小詳略無敢偏廢也然本其所以作取便於童子之習而巳故名曰集注詳說蓋將藏之家塾俾兒輩學非敢爲他人發也嗚呼小子來前予㓜􅀗父師之訓從事於此三十餘年材資不敏未能有得今乃妄意採摭先儒有所取舍度德量力夫豈所宜然施之汝曹取其易曉以是庶幾其可幸無罪焉耳夫其訓詁之詳且明也日講焉則無不通矣義理之精且約也日誦焉則無不識矣通者巳知而時習識者未解而勿忘予之始學亦􅀂斯而已矣嗚呼小子其懋戒之哉汲汲焉而毋欲速也循循焉而毋敢惰也毋牽於俗學而絶之以爲迂且淡也毋惑於異端而獵之以爲近且卑也聖人之書大中至正之極而萬世之標準也古之學者其始卽此以爲學其卒非離此以爲道窮理嚍性脩身齊家推以及人內外一致蓋取諸此而無所不備亦修吾身而巳矣舍而他求夫豈無可觀者然致遠恐泥昔者吾幾陷焉今裁自脫故不願汝曹之爲之也嗚呼小子其懋敬之朱子曰主敬致知摧驕破吝謹之於細微雜亂之域而養之於虚閒靜一之中右朱子送門人李伯諫敎授蘄學之訓上文云與伯諫游而講於斯也亦三年矣凡持守之要玩索之端巨細精粗蓋巳無所不論今使之言其又何以加此然有一焉云云是則雖屢言之而豈患乎瀆哉朱子日用自警詩云圓融無際大無餘卽此身心是太虚不向用時勤猛省却於何處味眞腴尋常應對尤須謹造次施爲莫放疎一日洞然無别體方知不枉費工夫先師果齋史先生每敎學者必首以此篇使之揭于座右曰學問進脩之大端其略有四一曰尚志二曰居敬三曰窮理四曰反身大抵爲士莫先於尚志孔子曰吾十有五而志于學孟子曰士何事曰尚志仁義而巳矣程子亦曰言學便當以道爲志言人便當以聖爲志苟此志不立而惟流俗之徇利欲之趨則終身墮於卑􅋘而不足與詣高明光大之域矣何足以爲士哉此志旣立便當居敬以涵養其本原蓋人心虚靈天理具足仁義禮智皆吾固有聖賢之所以爲聖賢者非自外而得之也茍能端莊靜一以涵養之則志氣淸明義理昭著而人欲自然退聽以此窮理理必明以此反身身必誠乃學問之本原也夫旣知涵養其本原則天理之全體固渾然於吾心矣然一心之中雖曰萬理咸具天叙天秩品節粲然苟非稽之聖賢講之師友察之事物驗之身心以究析其精微之極至則知有所蔽而行必有所差此大學之誠意正心脩身所以必先格物致知中庸之篤行所以必先博學審問愼思明辨也旣知所以窮理矣則必以其所窮之理反之於身以踐其實日用之閒微而念慮著而云爲其當然者皆天理之公其不當然者皆人欲之私也於此謹而察之果當然乎則充之唯恐其不廣行之唯恐其不至果不當然乎則改之唯恐其不速去之唯恐其不盡從事於斯無少閒斷則人欲日以消泯天理日以純熟而聖賢之道忽不自知其實有於我矣窮則獨善其身可以繼徃聖而開來學達則兼善天下可以參天地而賛化育其功用有不可勝窮者􅀂夫趨向卑􅋘而此志不立持養疎略而此心不存講學之功不加而所知者昏蔽反身之誠不篤而所行者悖戾將見人欲愈熾天理愈微本心一亡亦將何所不至哉書曰惟聖罔念作狂惟狂克念作聖聖狂之分特在念不念之閒而巳矣倂惟同志勉之此本雙峯饒氏之訓果齋先生名蒙􅀸字景正鄞人早師常德小陽先生名岊號字溪大陽先生名枋號存齋陽先生師涪陵㬊先生名淵字亞夫㬊先生師朱子程氏家塾讀書分年日程綱領程氏家塾讀書分年日程卷一鄞程端禮述日程節目主朱子敎人讀書法六條修其分年主朱子寛箸期限緊箸課程之說修八歲未入學之前讀性理字訓程逢原增廣者日讀字訓綱三五段必乃朱子以孫芝老能言作性理絶句百首敎之之意以此代世俗蒙求千字文最佳又以朱子童子須知貼壁於飯後行飯時使之記說一段自八歲入學之後讀小學書正文凡摽于上者皆旁證日止讀一書自㓜至長皆然此朱子朱子曰讀書須一件一件讀理會了一件苦口敎人之語隨日力性資自方可換一件􅀂不與逐件理會雖讀到老一二百字漸增至六七百字日依舊生又曰須是精專精研使一書通透永年長可近千字乃已每大段爛熟都無記不得處方别換一書乃爲有內必分作細段每細段必看讀益􅀂輪流通念而覈之不精則亦未免枉百遍倍讀百遍又通倍讀二三費工夫也須是通透後又却如此溫習乃十遍後凡讀經書倣此自此說爲佳耳又曰讀書不精􅀷只是不專一小學書卽嚴幼儀大抵小兒終朱子小學書取吕舍人法靜室危坐讀取日讀誦不惟困其精神且致其二三百遍字字句句須要分明又毎日須習爲悠緩以待曰莫法當纔辦連前三五授通讀五七十遍遍數卽暫歇少時復令入學如此可免二者之患日程不欲别見通論于此日程小學讀經三日習字演文一日所分節目詳見印空眼簿大學必待做次卷工用仍依序程方許學文大學必雞初鳴卽起一每夙興卽先自倍讀巳讀冊首書至昨朱子所訂門人程董學則云必正心肅容日所讀書一遍内一日看讀內記遍數遍數巳足而未成誦必須成誦遍一日倍讀生處誤處記號以待數未足雖巳成誦必滿遍數又曰一百夜閒補正遍數其閒日看讀本遍時自是勝五十遍時二百遍時自是勝爲童㓜文理未通誤不自知者一百遍時荀子曰君子知夫不全不粹設年十四五以上者只倍讀師之不足以爲美也故誦數以貫之思索以標起止于日程空眼簿凡冊首通之爲其人以處之除其害以持養之朱書爛熟無一句生誤方是工夫子曰司馬公答學者說爲學之法舉荀子已到方可他日退在夜閒與平四句云云此說亦好誦數云者想古人亦日巳讀書輪流倍溫乃得力如記遍數貫字訓熟如習貫自然之貫又訓未精熟遽然退混諸書中則溫通誦得熟方能通曉􅀂不熟亦無可思索倍漸疎不得力矣宜謹之凡倍又門人問曰某縁資質魯鈍全記不起讀熟書逐字逐句要讀之緩而朱子曰只是貪多故記不得福州陳晉之又緩思而又思使理與心浹朱極魯鈍讀書只五十字必三百遍而後能子所謂精思所謂虚心涵泳孔熟積集讀去後來却應賢良要之人只是子所謂溫故知新以異於記問不會耐苦耳之學者在乎此也一師試倍讀昨日書一師授本日正書假令授讀大學正文章朱子曰横渠敎人讀書必欲成誦眞道學定句讀圈發假借字音令面讀第一義須是如此以上方有箸力處也又子細正過於內分作細段隨文曰近與學者講論不覺横渠成誦之說是義可斷處多不過十句少約五爲捷徑又曰横渠云讀書須是成誦云今六句大段約千字分作十段或人不及古人處只爭這些子古人記得故十一二段用朱點記于簿四書本惟曉得今人鹵莾記不得故曉不得有梅溪書院新刋􅛞疏字大少誤有䟽文可參攷集注最便初朱子因論讀大學答以毎爲念慮攪擾頗學讀誦每行二十字五十行則千字細段約四五行則得矣妨工夫曰只是敬敬是常惺惺底法以敬還案每細段讀二百遍內一百爲主則百事皆從此做去今人都不理會遍看讀內一百遍倍讀句句字我底自不知心所在却要理會他事又要字要分明不可太快讀須聲實齊家治國平天下心者身之主也撑船須如講說然句盡字重道則句完用篙喫飯須用匙不理會心是不用篙不不可添虛聲致句讀不明且難使匙也攝心只是敬纔敬看做甚麽事登足遍數他日信口難舉須用數山固只這箇心入水亦只這箇心又曰珠或記數板子記數每細段二君子之爲學莊敬涵養以立其本而講於百遍足卽以墨銷朱點卽換讀義理以發明之則其口之所誦也有正業如前盡一日之力須足六七百而心之所處也有常分矣至於希世取寵字日永年長可近一千字寧賸之事不惟有所愧而不敢實亦有所急而段數不可省遍數仍通大段倍不暇焉讀二三十遍或止通倍讀全章正經幷注或問所盡亦可必待一書畢然後方換一書並不得兼讀他書及省遍數此以朱子讀書法小學書及所訂程董學則修一師試說昨日巳說書一師授說平日巳讀書不必多先說小學又曰大抵讀書須是虚心靜慮依傍文義書畢次大學畢次論語假如說根尋句脉看定此句指意是說何事略如小學書先令毎句說通朱子本今人言語襯貼替換一兩字說得古人意注及熊氏解及熊氏標題巳通思出來先敎自家心裏分明歷落如與古方令依傍所解字訓句意說正人對面說話彼此對答無一字一言不相文字求其訓注中無者使檢韻肯可此外都無閑雜説話方是得箇入處會求之不可杜撰以誤人寧以怕見如此棄却本文肆爲浮說說得郎當俗說麤解却不妨旣通說毎句都忘了從􅀄因甚話頭說得到此此最斈大義又通說毎段大義卽令自者大病也朱子論語口義序云反覆說通面試通乃巳乆之纔通者巳知而時習識者未觧而勿忘余以覺文義粗通能自說卽使自看始學亦􅀂斯而巳又曰􅀂曉得文義又注沉濳玩索使來試說更詰難記得固是好􅀂曉文義未得只背得少閒之以使之明透如說大學論語不知不覺自然相觸發曉得這道理蓋這亦先令說注透然後依傍注意一叚文義横在心下自然放不得必曉得說正文而後巳一小學習寫字必於四日内以一日令影寫智永千文楷字如童稚初寫者先以子昻所展千文大字爲格影寫一遍過却用智永如錢眞字影寫每字本一紙影寫十紙止令影寫不得惜紙於空處習眞書由智永千文入則巳兼得晉人骨令自寫以致走様寜令翻紙以肉閒架風度他年有餘力當習楽毅論畫空處再影寫如此影寫千文足賛黃庭經草書由智永以入二王章章行後歇讀書一二月以全日之力書則蘭亭􅂐與八分則熟看說文以習李通影寫一千五百字添至二千斯陽冰蔡邕古今以晉二王爲書斈之三千四千字以全日之力如此聖自唐歐虞楮薛顔柳皆斈晉而各得其冩一二月乃止必如此寫方能一體如夷之清惠之和耳故習字須以晉他日寫多運筆如飛永不走様爲法斈唐乃下策也又使自看寫一遍其所以用千文用智求楷字皆有􅀷意此不暇論待他年有餘力自爲充廣可也蓋儒者别項工夫多故習字止如此用筆之法雙鈎懸腕讓左側右虚掌實指意前筆後此口訣也欲考字看說文字林六劉漫塘云且未論學者所學如何只這幾書略切韻指掌圖正始音韻會箇字偏旁點畫十箇九箇差誤了而況能等書以求音義偏旁點畫六書曉得字上義理安得數人小學師且逐箇之正毎考三五字或十數字擇與諸生釐正一過所益亦自不少切用之字先考凡鈔書之字偏旁須依說文翻楷之體骨肉閒架氣象用智永非寫詩帖不得全用智永也一大學不得令日日作詩作對虚費日力今世俗之敎十五歲前不能讀記九經正文皆是此弊但令習字演文之日將已說小學書作口義以學演文每句先逐字訓之然後通解一句之意又通結一章之意相接續作去明埋演文一舉兩得更令記對􅀋單字使知虛實死活字更記􅀋首長天永日字但臨放學時面屬一對便行使略知對偶輕重虛實足矣此正爲已爲人務内務外君子儒小人儒之所由分此心先入者爲主終此生不可奪不惟妨工最是奪志朱子諄諄言之切戒一􅃗日之夜大學令玩索巳讀大學字求朱子曰觀者一見而决玩者反復而不捨其訓句求其義章求其旨每一之辭又曰大凡讀書不要般涉但溫尋舊節十數次涵泳思索以求其通底不妨不可將新底來搶又曰只是要熟又須虛心以爲之本毎正文一功夫純一而巳讀時熟看時熟玩味時熟節先攷索章句明逶然後摭章又答學者曰示諭且看大學俟見大指句之旨以說上正文毎句要說乃及他書此意甚美但看時須是更將大得精確成文鈔記旨要又攷索段分作小段字字句句不可容易放過常或問明透以參章句如遇說性時暗誦默思反覆研究未上口時須敎上口理􅀷奥精微處不計數看􅀡要未通透時須敎通透巳通透便要純熟􅀡曉得記得爛熟乃止仍參看黃是不思索時此意常在心胷之閒驅遣不勉齋眞西山集義通釋講義饒去方是此一段了又換一段看如此數段雙峯纂述輯講語錄金仁山大之後心安理熟覺得工夫者力時便漸得學疏義語孟攷證何北山王魯力也近覺得朋友閒病痛都是貪多務廣齋張達善句讀批抹畫截表注匆遽涉獵所以凡事草率粗淺本欲多知音攷胡雲峯四書通通證趙氏多能下梢一字不知一事不能本欲速成􅛞疏集成發明等書諸說有異反成虚度歳月但能反此如前所云試用處標貼以待思問如引用經史歳月之功當自見其益矣又曰論語逐章先儒語及性理制度治道故事細看每不過兩三段先令盡通諸說異同相關處必須檢尋看過凡玩索然後􅊥求聖言本意則乆之自當見效又一字一句一章分看合看要析曰􅀂不如此看是幾年也無長進又曰更之極其精合之無不貫去了本耐煩專一細看爲佳日月不易得大事未子信口分說得出合說得出於明甚可懼也又曰論語一日只看一段恐身心體認得出方爲爛熟朱子大段明白底則看兩段須是專一自早至諄諄之訓先要熟讀須是正看夜雖不讀亦當涵泳常在胷中如有一件背看左看右看看得是了未可事未了相似到晚却拖來商量但一日積便道是更須反覆玩味此之謂一段日日如此年歲閒自是裏面貫通道也不必多論語止看得一章二理分明又語工過曰爲學須要專一用章三章足矣只要自得凡先說工不可雜亂因舉異敎数語云用志不分者要極其精通其後未說者一乃凝於神置之一處無事不辦節易一節工夫不難矣只要記又曰平心易氣熟玩而徐思之自當見得得大學畢次論語次孟子次中義理明白穩當處不必彊說枉費心力也庸小學止令玩索小學燈火起又曰虚心平氣反復諷誦乆當有味今中秋止端午或生徒多參攷之以迫切之心求之正猶治絲而棼之雖欲書難遍及則參差雙隻夜以便彊爲之說終非吾心所安穿鑿支離愈叛之於道矣一雙日之夜倍讀凡平日巳讀書一遍倍又曰窮理以虚心靜慮爲本又曰看文字讀一二卷或三四卷隨力所至不可終日思量硬將心去馳逐亦須空閑記號起止以待後夜續讀倍讀少頃養精神又來看熟書必緩而又緩思而又思詳見讀冊首書條凡溫書必要倍讀纔放看讀永無可再倍之日前功廢矣切戒如防誤處寧以書安于案疑處正之再倍讀倍讀熟書時必須先倍讀本章正文畢以目視本章正文倍讀盡本章注文就思玩涵泳本章理二更止五更起不如此不如彼此古人夜趣凡倍讀訓詁時視此字正文凡倍讀通解時視此節正文讀法也夜讀將盡二更卽須熟睡蓋子時此法不惟得所以釋此章之􅀷前後不得睡則血不歸肝次日决無精神意且免經文注文混記無别之可以讀書勉彊至七日十日必得嗽疾咯患如倍讀忘處急用遍數補之血成瘵反終身不可任勞事矣勤者宜戒凡已讀書一一整放在案周而復始以日程幷書目揭之于壁夏夜浴後露坐無燈自可倍讀一隨雙隻日之夜附讀看玩索性理書性理畢次治道次制度如大學失時失序當補小學書者先讀小學書數段仍詳看解字字句句自要說得通透乃止小學書畢讀程氏增廣字訓綱此書鈐定性理語約而義備如醫家脉訣最便初學次看北溪字義續字義次讀太極圖通書西銘並有朱字義前有性理圖七箇雙峯亦有性理圖子解及有何北山發揮次讀近朱子所編伊洛淵源延平答問朱子年譜思錄看葉氏解續近思錄蔡氏編見性理羣書行狀皆須看次看讀書記大學術義程子遺書外書經說文集周子文集張子正蒙朱子大全集語􅀋等書或看或讀必詳玩潛思以求透徹融會切已體察以求自得性理緊切書目通載于此讀看者自循輕重先後之序有合記者仍分􅀋節鈔􅀂治道亦見西山讀書記大學衍義一以前日程依序分日定其節目寫作空眼刋定印板使生徒每人各置一簿以憑用工次日早於師前試驗親筆勾銷師復親標所授起止于簿庶日有常守心力整暇積日而月積月而歲師生兩盡皆可自見施之學校公敎尤便有司拘鈐考察小學讀經習字演文必須分日讀經必用三日習字演文止用一日本未欲以此閒讀書之日縁小學習字習演口義小文詞欲使其學開筆路有不可後者故也假如小學簿紙百張以七十五張印讀書日程以二十五張印習字演文日程可用二百日至如大學惟印讀經日程待四書本經傳注旣畢作次卷工程時方印分日讀看史日程畢印分日讀看文日程畢印分日作文日程其先後次序分日輕重决不可紊人􅀂依法讀此亦朱子所謂行程曆今日到何處明日得十餘箇簿則爲大儒也孰禦到何處之意他年亦須自塡以自檢束則歲東萊吕氏亦有日記月不虛擲矣今將巳刋定空眼式連于次卷學者誠能刋印置簿日塡功效自見也朱子曰讀書玩理但嚴立功程小學書畢寛箸意思乆之自當有味不可次讀大學經傳正文求欲速之功也又曰寬箸期限一讀書倍溫書說書習字演文如緊箸課程又曰人􅀂辦得十來前法年世間甚書讀不了次讀論語正文又曰爲學之序爲已而後可以次讀孟子正文及人通理然後制事故程子敎次讀中庸正文人先讀論孟次及諸經然後看次讀孝經刋誤史其序不可亂又曰史書閙􅀬一讀書倍溫書說書習字演文並經書冷淡後生心志未定少有如前法不偏向外去亦當預防也次讀易正文六經正文依程子朱子胡氏蔡氏句讀參廖氏及古注陸氏音義賈氏音辨牟氏音攷一讀書倍溫書說書習字演文並如前法次讀書正文次讀詩正文次讀儀禮幷禮記正文次讀周禮正文次讀春秋經幷三傳正文前自八歲約用六七年之功則十五歲前小學書四書諸經正文可以盡畢旣毎細段看讀百遍倍讀百通文通倍讀大段早倍溫冊首書夜以序通倍溫巳讀書守此决無不熟之理自十五志學之年卽當尚志爲學以道爲志爲朱子曰􅀂不能敬則講學無安頓處又人以聖爲志自此依朱子法讀曰古人之學以莊敬持守爲先而讀書窮四書注或十五歲前用工失時理以發其趣又曰此亦有十數朋失序者止從此起便讀大學章友不免今熟看注解以通念爲先而徐思句或問仍兼補小學書其義只尋正意母得讀大學章句或問支蔓似方略有頭緒一讀書倍溫書所讀字數分段看讀百遍倍讀百遍並如前法一夜閒玩索倍讀巳讀書玩索讀看性朱子論孟集義序曰論孟之書學者所以理書並如前法必􅃀守朱子讀求道之至要古今爲說者百有餘家然自書法六條居敬持志循序漸進秦漢以來儒者􅀋皆不足以與聞斯道之熟讀精思虚心涵泳切巳體察傳宋興百年河洛之閒有二程先生者出著緊用力必以身任道靜存動然後斯道之傳有繼其於孔子孟氏之心察敬義夾持知行並進始可言蓋異世而同符也故其發明二書之說言學不然則不誠無物雖勤無益雖近而索之無窮指雖遠而操之有要使也朱子諭學者曰學者書不記夫讀者非徒可以得其言而又可以得其熟讀可記義不精細思可精惟意非徒可以得其意而又可以幷其所以有志不立眞是無箸力處只如進於此者而得之其所以興起斯文開悟今人貪利祿而不貪道義要作後學可謂至矣旣又取夫學之有同於先貴人而不要作好人皆是志不生者與其得於先生者􅀂橫渠張公􅀂范立之病􅀡須反覆思量究其病氏二吕氏謝氏游氏楊氏侯氏尹氏凡九痛起處勇猛奮躍不伏作此等家之說以附益之以備觀省或者曰凡說人一躍躍出見得聖賢千言萬之行於世而不列於此者皆無取巳乎曰語都無一字不是實語方始立不然也漢魏諸儒通訓詁考制度辨名物得此志就此積累工夫迤􅆔向其功博矣學者苟不先涉其流則亦何以上去大有事在諸君勉􅏧不是用力於此特所以求夫聖賢之意則在此小事又如程子四箴朱子敬齋而不在彼也朱子曰二程先生說箴西山夜氣箴當熟玩體察外得親切處􅀡須看得爛熟與經文一般成有天台南塘陳先生名栢字茂􅀸夙誦在心乃可又曰爲學之道更無它法但興夜寐箴曰雞鳴而寤思慮漸能熟讀精思乆之自有見處尊所聞行所馳盍於其閒澹以整之或省舊知乆之自有至處又曰讀書固收心之愆或紬新得次第條理瞭然默助然今只讀書時􅀵得心不讀書便爲事識本旣立矣昧爽乃興盥櫛衣所奪而是心之存也常少而其放也常多冠端坐歛形提掇此心皦如出矣胡爲不移此讀書工夫向不讀書處用日嚴肅整齊虚明靜一乃啓方力便動靜兩得而此心無時不存乎冊對越聖賢夫子在坐顏曾後果齋先生常於座閒大書靜存動察四字先聖師所言親切敬聽弟子問以自􅀧檢朱子曰讀書固不可辯反覆參訂事至斯應則驗于廢然亦須以主敬爲先方可就此田地上爲明命赫然常目在之事應旣推尋義理見諸行事􅀂平居泛然略無存巳我則如故方寸湛然凝神息養之功文無實踐之志而但欲曉解文義慮動靜循環惟心是監靜存動說得分明則雖盡通諸經不錯一字亦何察勿貳勿三讀書之餘閒以游所益近覺朋友讀書講論多不得力其病泳發舒精神休養情性日莫人皆出於此不可不􅀷戒也又曰持敬讀書倦昏氣易乗齊莊正齊振拔精只是一事而表裏各用力耳􅀂有所偏便明夜乆斯寢齊手歛足不作思疑都不曾做工夫今且逐日箸實做將去惟心神歸宿養以夜氣貞則復未須比量難易計較得失徒然紛擾不濟元念玆在玆日夕乾乾昔金華事要令日用之閒只見本心義理都不見魯齋王先生名栢字會之以爲此箴有他物方有得力處耳甚切得受用以敎上蔡書院諸生使之人寫一本置坐右又云養以夜氣足以證西山之誤大學章句或問畢次讀論語集注次讀孟子集注次讀中庸章句或問次鈔讀論語或問之合于集注者次鈔讀孟子或問之合于集注者次讀本經治周易鈔法一依古易十二篇勿鈔又曰近日眞箇讀書人少也緣科舉時文􅂏傳􅁚傳附每段經文之後先之弊他纔把書來讀便先立箇意思要討手鈔四聖經傳正文依古易讀新奇都不理會也本意著實􅂊討得新奇之别用紙依次鈔每段正文次便準擬作時文使下稍弄得熟只是這箇低正文一字鈔所主朱子本義將來使雖是朝廷甚麽大典禮也胡亂信次低正文一字鈔所主程子傳手捻出來使不知一撞百碎前輩也是讀其連解􅂏傳象傳者須截在􅂏書某曾見大東萊之兄是他於六經三傳傳􅁚傳正文後鈔次低正文一皆通他親手點注並用小圈點注所不足字節鈔所兼用古注疏次低正者並將疏楷書用朱點無點畫草某只見文二字附節鈔陸氏音義次節他禮記知此他經皆如此鈔胡庭芳所附朱子語錄文集謹按明經守家法凡曰主某說者則是其何北山啓蒙繫辭發揮朱子孫說巳合經意當主之而不可違必演而伸鑑所集易遺說去其重者次低之可也凡曰用某說者則是其說猶或未正文二字節鈔董氏所附程子盡合于經意必用其說辨其得失而斷之語録文集次低正文三字節鈔以經意又參所主之說而通論之可也其胡庭芳所纂諸家解及胡雲峯法本漢左雄詳見朱子貢舉私議而方今易通及諸說精􅃀而有裨朱子科制因之惟平日能以此法明經則他本義者其正文分段以朱子本日能以此作義矣明經作義自是兩截工義爲主每段正文旣鈔諸說仍夫今俗學旣無明經一截工夫爲欲作義空餘紙使可續鈔其讀昜綱領始爲渉獵傳注之計冝讀經無沉濳自得及先儒諸圖及說鈔于卷首圖之實也在啓蒙者不可移讀法其朱子本義程子傳所節古注䟽並依讀四書例盡塡讀經空眼簿如前法須令先讀五贊啓蒙及發揮次本義畢然後讀程子傳畢然後讀所節古注疏其所附鈔亦玩讀其所當讀者餘止熟看參攷其程子傳古注疏與朱子本義訓詁指義同異以玩索精熟爲度異者以異色筆批抹毎卦作一冊治尚書鈔法先手鈔全篇正文讀之别用紙鈔正文一段次低每段正文一字鈔所主蔡氏傳次低正文一字節鈔所兼用古注疏次低正文二字附節鈔陸氏音義次低正文二字節鈔朱子語錄文集之及此段者次低正文三字節鈔金氏表注及董氏所纂諸儒之説及諸說精􅃀而有裨蔡氏傳者其正文分段以蔡氏傳爲主毎段正文旣鈔諸說仍空餘紙使可續鈔其書序及朱子所辯附鈔每篇之末其讀書綱領及先儒諸圖鈔于首卷讀法其蔡氏傳及所節古注疏並依讀四書例盡塡讀經空眼簿如前法其所附鈔亦玩讀其所當讀者餘止熟看參攷須令先讀蔡氏傳畢然後讀古注疏其古注疏與蔡氏傳訓詁指義同異以玩索精熟爲度異者以異色筆批抺每篇作一冊治詩鈔法先手鈔詩全篇正文讀之别用紙鈔詩正文一章音義恊音並依朱子次低正文一字鈔所主朱子傳次低正文一字節鈔所兼用古注疏次低正文二字附節鈔陸氏音義次低正文二字節鈔朱子語録文集之及此章者次低正文三字節鈔輔氏童子問及魯齋王氏詩疑辨及諸說精􅃀而有禆朱子傳者每段正文旣鈔諸說仍空餘紙使可續鈔其詩小序及朱子所辯附鈔毎篇之末其讀詩綱領及先儒諸圖鈔于首卷讀法其朱子傳及所節古注疏並依讀四書例盡塡讀經空眼簿如前法其所附鈔亦玩讀其所當讀者餘止熟看參攷須令先讀朱子傳畢然後讀古注疏其古注疏及朱子傳訓詁指義同異以玩索精熟爲度異者以異色筆批抹每篇作一冊解精􅃀而有裨正經古注疏者其正文分段以古注爲主每段正文旣鈔諸説仍空餘紙使可續鈔蓋治禮必先讀儀禮經其讀禮記綱領及先儒諸圖及楊氏儀禮圖鈔于首卷讀法其所節古注幷疏依讀四書例盡塡讀經空眼簿如前法其所附鈔亦玩讀其所當讀者餘止熟看參攷其古注疏之所以合于經與否以玩索精熟爲度其未合者以異色筆批抹每篇作一冊或二三冊治春秋鈔法先手鈔正經每一年作一段讀之讀全經畢别用紙鈔謹按程子曰以傳攷經之事跡以經别傳當年經文一段次低經文一字之眞僞朱子曰春秋不過􅀡書其事而以節鈔所許用三傳胡氏傳諸說爵氏名字日月土地爲褒貶􅀂法家之􅀷之合于經之本義者次低經文刻乃傳者之鑿說端禮弟端學自早年讀一字節鈔三傳胡氏傳諸説之四書諸經之餘用其二十餘年之工注春未合者次低經文二字附節鈔秋其大要以程朱之論攷正三傳胡氏之陸氏音義次低經文二字鈔程得失以爲合於程朱之論則合於經之旨端學所著辯疑或問凡諸說之矣故用三傳胡氏之有合者爲本義諸說有禆正經三傳胡氏傳者巳詳之合者亦附見焉其相戾者爲辨疑以正見成書每段正文旣鈔諸說仍之又摘諸說之害經者爲或問以明所以空餘紙使可續鈔其讀春秋綱去取之由庶幾士之讀此經者旣可因程領及先儒諸圖鈔于首卷讀法朱以得孔子作經之微旨又所以仰遵設凡所節三傳胡氏傳並依讀四科許用之初意其網羅之博采擇之精當書例盡塡讀經空眼簿如前法丗諸老亦許其有禆此經而􅀘朱子之所其所附鈔亦玩讀其所當讀者未注者云餘止熟看參攷其三傳胡氏之所以合于經與否以玩索精熟爲度其未合者以異色筆批抹毎年作一卷每公作一冊或二三冊前自十五歲讀四書經注或問本經傳注性理諸書確守讀書法六條約用三四年之功晝夜專治無非爲巳之實學而不以一豪計功謀利之心亂之則敬義立而存養省察之功密學者終身之大本植矣程氏家塾讀書分年日程卷一
