front:
  text: 右稼軒書院山長程君本朱真二先生教法詳為工程以教今之應舉者用意迂而得效甚捷學者能信守不懈則其進也敦潔夫下學上達之功則有不外是者使學者病其迂則亦不足以言學矣凡學道者不合乎今然後能合乎古惟程君勿以人言自畫則又余之望也至治改元良月草又八日巴西鄧文原因巡歷建平觀此輒書其後是亦勉㝎安劉侯謙父見鄉友鉛山教授程君敬叔讀書分年日程書大善之俾余為之序既捐資刋版以之歸教北方之學者矣今敬叔重為刪㝎其門人與鄉友又捐資刋于甬東之家孰余謂此書之為法蓋以當讀之書㝎其本末重輊先後之序詳其莭目分之以年程之以日俾其心力淂以主一而整暇先讀一書精熟胸中阮有真知自淂之實然後以此一書之所淂者為本而再讀一書讀四書諸經皆然然後以其淂于經者為本而看史然後以其淂于經史者為本而為文蓋截然不可少有所紊且兼也其始之讀也惟務眀經修行以立儒者之大本若不知丗之有作文應舉事者及其應舉也則又初不外此以為業其為文也又皆沛乎其直寫胸中之真見而不假牽合傅會無用之虗辭又可因其有言而責其有德有業故科舉之行或不行學者之應舉或不應舉皆不可以無此書也使朱子復生思救士習之弊不能易此矣凡為師弟子者知守是以教以學有司之職在興學者知守是以為勸勉程督之方庶乎學校有造士之實而真儒之效白于天下矣豈特為科目增重而已哉其或憚焉而不能守者皆見小欲速者也務外為人者也此儒之小人由是以分是又不足以言學不足以為士矣敬叔職教江左學校者四十年所至以此為教而躬其勞以求實益凡其所教與門人之守焉以為教者成效卓然所在刋以為式且未嘗以職之卑為淹而惟以盡職之難是憂其亦異于丗之為學官者矣元統三年十一月朔前武林郡文學甬東薛觀處靜父識
